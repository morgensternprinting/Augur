<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<!--
  viewport-fit=cover: content extends behind the notch/Dynamic Island and
  home indicator. Safe areas are then handled via env(safe-area-inset-*).
-->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<!-- iOS PWA / standalone mode -->
<meta name="apple-mobile-web-app-capable" content="yes">
<!--
  black-translucent: status bar is transparent, our background shows through.
  Content starts at the very top of the screen; we use env(safe-area-inset-top)
  to push it below the clock / battery area.
-->
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Augur">

<!-- Match browser chrome to app bg on Android / non-Safari -->
<meta name="theme-color" content="#0C0F14">

<title>Augur</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }

  body {
    background: var(--bg-app);
    font-family: var(--font-ui);
    /* Prevent the whole page from rubber-band scrolling on iOS */
    overscroll-behavior: none;
    /* Opt out of iOS font size auto-adjustment in landscape */
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }

  #root {
    /* Fill the full screen including areas behind notch/home bar */
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
  }

  /* ── Touch optimisations ── */
  button, [role="button"] {
    /* Remove the grey flash on tap (iOS) */
    -webkit-tap-highlight-color: transparent;
    /* Skip 300ms tap delay — use pointer events */
    touch-action: manipulation;
    /* Prevent text selection on long-press */
    -webkit-user-select: none;
    user-select: none;
  }

  /* ── Scrollable regions inside screens ── */
  /* The Body component inside each screen already uses overflow-y: auto.
     Momentum scrolling is the default on modern iOS/Safari; no extra flag needed. */

  /* ── Hide scrollbars (cosmetic, consistent with design prototype) ── */
  ::-webkit-scrollbar { width: 0; height: 0; }
  * { scrollbar-width: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../../_ds_bundle.js"></script>
<script src="data.js"></script>

<script type="text/babel" src="_shared.jsx"></script>
<script type="text/babel" src="AppShell.jsx"></script>
<script type="text/babel" src="CombatSelect.jsx"></script>
<script type="text/babel" src="ResultProbabilistic.jsx"></script>
<script type="text/babel" src="CombatAssistant.jsx"></script>
<script type="text/babel" src="GameTracker.jsx"></script>

<script type="text/babel" data-presets="react">
  window.AugurNS = window.AugurOldWorldCompanionDesignSystem_b6c10f;

  function App() {
    const [tab, setTab] = React.useState('select');
    React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [tab]);

    let screen;
    if (tab === 'select')         screen = <CombatSelect onSimulate={() => setTab('result')} />;
    else if (tab === 'result')    screen = <ResultProbabilistic onResolve={() => setTab('assistant')} />;
    else if (tab === 'assistant') screen = <CombatAssistant onDone={() => setTab('tracker')} />;
    else                          screen = <GameTracker />;

    return <AppShell active={tab} onTab={setTab}>{screen}</AppShell>;
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
