<!-- @dsCard group="Type" viewport="700x180" name="Display & hero numeral" subtitle="Plex Sans Condensed — titles + the VP figure" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-app); color:var(--text-primary); padding:18px 22px; display:flex; align-items:center; gap:36px; }
  .hero { font-family:var(--font-display); font-weight:700; font-size:var(--fs-hero); line-height:var(--lh-tight); color:var(--positive); letter-spacing:var(--ls-tight); }
  .meta { font-family:var(--font-mono); font-size:10px; color:var(--text-tertiary); margin-top:6px; }
  .title { font-family:var(--font-display); font-weight:600; font-size:var(--fs-display); line-height:var(--lh-snug); }
  .h2 { font-family:var(--font-display); font-weight:600; font-size:var(--fs-h2); color:var(--text-secondary); }
</style>
</head>
<body>
  <div>
    <div class="hero">+148</div>
    <div class="meta">hero · 56 / 700</div>
  </div>
  <div>
    <div class="title">Résultat probabiliste</div>
    <div class="h2">Sélection du combat</div>
    <div class="meta">display 34 · h2 21</div>
  </div>
</body>
</html>
