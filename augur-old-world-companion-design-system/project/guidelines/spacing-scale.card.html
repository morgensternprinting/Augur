<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px grid — sp-1 → sp-12" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-app); color:var(--text-tertiary); padding:18px 22px; font-family:var(--font-mono); display:flex; gap:16px; align-items:flex-end; }
  .col { display:flex; flex-direction:column; align-items:center; gap:6px; font-size:10px; }
  .bar { background:var(--signal-500); width:18px; border-radius:2px; }
</style>
</head>
<body>
  <div class="col"><div class="bar" style="height:4px"></div>1</div>
  <div class="col"><div class="bar" style="height:8px"></div>2</div>
  <div class="col"><div class="bar" style="height:12px"></div>3</div>
  <div class="col"><div class="bar" style="height:16px"></div>4</div>
  <div class="col"><div class="bar" style="height:20px"></div>5</div>
  <div class="col"><div class="bar" style="height:24px"></div>6</div>
  <div class="col"><div class="bar" style="height:32px"></div>8</div>
  <div class="col"><div class="bar" style="height:40px"></div>10</div>
  <div class="col"><div class="bar" style="height:48px"></div>12</div>
</body>
</html>
