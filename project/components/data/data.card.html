<!-- @dsCard group="Components" viewport="700x520" name="Data & combat viz" subtitle="VPMeter, OutcomeBar, OutcomeLegend, UnitStatCard, StatusDot" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--bg-app); padding:20px; }
  #root { display:flex; flex-direction:column; gap:18px; max-width:600px; }
  .lab { font:600 11px/1 var(--font-ui); letter-spacing:.1em; text-transform:uppercase; color:var(--text-tertiary); margin-bottom:8px; }
  .row { display:flex; gap:16px; align-items:flex-start; }
  .panel { background:var(--surface-1); border:1px solid var(--border-subtle); border-radius:var(--r-lg); padding:16px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { VPMeter, OutcomeBar, OutcomeLegend, UnitStatCard, StatusDot } = window.AugurOldWorldCompanionDesignSystem_b6c10f;
  const dist = { win:0.46, draw:0.10, give:0.18, fallback:0.12, flee:0.14 };
  function Demo() {
    return (
      <React.Fragment>
        <div className="row">
          <div className="panel" style={{flex:'0 0 220px'}}>
            <VPMeter value={148} range={[92,196]} />
          </div>
          <div className="panel" style={{flex:1}}>
            <div className="lab">OutcomeBar + Legend</div>
            <OutcomeBar dist={dist} style={{marginBottom:14}} />
            <OutcomeLegend dist={dist} />
          </div>
        </div>
        <div className="row">
          <UnitStatCard side="friendly" selected style={{flex:1}} unit={{
            name:'Gardes du Roi', points:285,
            profile:{cc:4,str:3,tou:4,att:1,save:'4+',cd:8},
            fu:{current:18,max:25}, status:'full', isGeneral:true, hasStandard:true }} />
          <UnitStatCard side="enemy" style={{flex:1}} unit={{
            name:'Guerriers Orques', points:210,
            profile:{cc:3,str:3,tou:4,att:1,save:'6+',cd:7},
            fu:{current:5,max:30}, status:'weak' }} />
        </div>
        <div className="panel">
          <div className="lab">StatusDot</div>
          <div style={{display:'flex',gap:24,flexWrap:'wrap'}}>
            <StatusDot status="full" />
            <StatusDot status="weak" />
            <StatusDot status="fleeing" pulse />
            <StatusDot status="destroyed" />
          </div>
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
