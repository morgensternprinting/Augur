<!-- @dsCard group="Colors" viewport="700x150" name="Signal accent" subtitle="The one brand colour — steel cyan" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-app); font-family:var(--font-mono); color:var(--text-secondary); padding:18px; display:flex; gap:10px; align-items:center; }
  .sw { flex:1; height:88px; border-radius:var(--r-md); display:flex; flex-direction:column; justify-content:flex-end; padding:8px; box-sizing:border-box; color:#051018; font-size:10px; }
  .glow { box-shadow:var(--glow-signal); }
  .lab { display:block; font-weight:600; }
  .hex { opacity:.7; }
</style>
</head>
<body>
  <div class="sw" style="background:var(--signal-700)"><span class="lab" style="color:#cdeaf5">700</span><span class="hex" style="color:#cdeaf5">#1E6E92</span></div>
  <div class="sw" style="background:var(--signal-600)"><span class="lab" style="color:#eaf7fc">600</span><span class="hex" style="color:#eaf7fc">#2A8DB8</span></div>
  <div class="sw glow" style="background:var(--signal-500)"><span class="lab">500 · accent</span><span class="hex">#3FA7D6</span></div>
  <div class="sw" style="background:var(--signal-400)"><span class="lab">400</span><span class="hex">#6BC1E4</span></div>
  <div class="sw" style="background:var(--signal-300)"><span class="lab">300</span><span class="hex">#9BD7EE</span></div>
</body>
</html>
