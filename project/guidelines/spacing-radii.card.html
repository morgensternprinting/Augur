<!-- @dsCard group="Spacing" viewport="700x170" name="Radii, elevation & touch" subtitle="Corners, dark-UI shadows, table touch targets" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-app); color:var(--text-tertiary); padding:18px 22px; font-family:var(--font-mono); display:flex; gap:30px; align-items:center; flex-wrap:wrap; }
  .grp { display:flex; gap:12px; align-items:center; }
  .box { width:54px; height:54px; background:var(--surface-2); border:1px solid var(--border-default); display:flex; align-items:flex-end; justify-content:center; padding-bottom:4px; font-size:9px; color:var(--text-secondary); }
  .e1 { box-shadow:var(--shadow-1); } .e2 { box-shadow:var(--shadow-2); } .e3 { box-shadow:var(--shadow-3); }
  .touch { background:var(--signal-soft); border:1px solid var(--signal-600); border-radius:var(--r-md); display:flex; align-items:center; justify-content:center; color:var(--signal-300); font-size:10px; }
  .lab { font-size:9px; color:var(--text-tertiary); }
</style>
</head>
<body>
  <div class="grp">
    <div class="box" style="border-radius:var(--r-sm)">sm</div>
    <div class="box" style="border-radius:var(--r-md)">md</div>
    <div class="box" style="border-radius:var(--r-lg)">lg</div>
    <div class="box" style="border-radius:var(--r-pill)">pill</div>
  </div>
  <div class="grp">
    <div class="box e1">e1</div>
    <div class="box e2">e2</div>
    <div class="box e3">e3</div>
  </div>
  <div class="grp">
    <div class="touch" style="width:44px;height:44px">44</div>
    <div class="touch" style="width:60px;height:52px">52</div>
    <div class="touch" style="width:70px;height:60px">60</div>
  </div>
</body>
</html>
