<!DOCTYPE html>
<html lang="fr">
<head>

<!-- ══════════════════════════════════════════════════════════════
     Augur — table-side companion for Warhammer: The Old World.
     Single self-contained file. Real combat engine (Monte-Carlo)
     wired to the existing TOW unit data. Dark-first sober instrument.
     Design system: augur-old-world-companion-design-system handoff.
     ══════════════════════════════════════════════════════════════ -->

<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans+Condensed:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');

:root {
  /* ---- Neutral slate ramp ---- */
  --slate-950:#080A0E; --slate-900:#0C0F14; --slate-880:#11151C; --slate-850:#151B24;
  --slate-800:#1B232F; --slate-750:#222C3A; --slate-700:#2B3645; --slate-600:#3B4859;
  --slate-500:#556377; --slate-400:#7C8CA3; --slate-300:#A2B0C4; --slate-200:#C9D3E0;
  --slate-100:#E7ECF3; --slate-50:#F4F6FA;

  /* ---- Brand signal ---- */
  --signal-700:#1E6E92; --signal-600:#2A8DB8; --signal-500:#3FA7D6; --signal-400:#6BC1E4; --signal-300:#9BD7EE;
  --signal-soft:rgba(63,167,214,0.14); --signal-glow:rgba(63,167,214,0.30);

  /* ---- Outcome spectrum (best → catastrophe) ---- */
  --out-win:#4FB07A; --out-draw:#6E83A6; --out-give:#C9A24B; --out-fallback:#D98441; --out-flee:#E4544E;
  --out-win-soft:rgba(79,176,122,0.16); --out-give-soft:rgba(201,162,75,0.16);
  --out-flee-soft:rgba(228,84,78,0.16); --out-flee-glow:rgba(228,84,78,0.34);

  /* ---- Status ---- */
  --status-full:#4FB07A; --status-weak:#C9A24B; --status-fleeing:#E4544E; --status-destroyed:#55657C;

  /* ---- Semantic ---- */
  --positive:#4FB07A; --caution:#D9A441; --danger:#E4544E; --info:#3FA7D6;

  /* ---- Surfaces ---- */
  --bg-app:var(--slate-900); --bg-sunken:var(--slate-950);
  --surface-1:var(--slate-850); --surface-2:var(--slate-800); --surface-3:var(--slate-750); --surface-hover:var(--slate-700);

  /* ---- Borders ---- */
  --border-subtle:rgba(162,176,196,0.10); --border-default:rgba(162,176,196,0.16); --border-strong:rgba(162,176,196,0.28);

  /* ---- Text ---- */
  --text-primary:var(--slate-100); --text-secondary:var(--slate-300); --text-tertiary:var(--slate-400);
  --text-disabled:var(--slate-500); --text-on-signal:#051018; --text-inverse:var(--slate-900);
  --ring:0 0 0 2px var(--bg-app),0 0 0 4px var(--signal-500);

  /* ---- Type ---- */
  --font-display:'IBM Plex Sans Condensed','Arial Narrow',sans-serif;
  --font-ui:'IBM Plex Sans',system-ui,-apple-system,sans-serif;
  --font-mono:'IBM Plex Mono',ui-monospace,'SF Mono',monospace;
  --fs-hero:56px; --fs-display:34px; --fs-h1:26px; --fs-h2:21px; --fs-h3:18px;
  --fs-body:16px; --fs-sm:14px; --fs-xs:12px; --fs-label:11px;
  --fw-regular:400; --fw-medium:500; --fw-semibold:600; --fw-bold:700;
  --lh-tight:1.04; --lh-snug:1.2; --lh-normal:1.45;
  --ls-tight:-0.02em; --ls-normal:0; --ls-label:0.10em;

  /* ---- Spacing ---- */
  --sp-0:0; --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px; --sp-6:24px;
  --sp-8:32px; --sp-10:40px; --sp-12:48px; --sp-16:64px;
  --touch-min:44px; --touch-comfy:52px; --touch-large:60px;
  --screen-pad:16px; --screen-w:390px; --safe-top:12px; --safe-bottom:24px;

  /* ---- Radii / elevation / motion ---- */
  --r-xs:4px; --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:22px; --r-pill:999px;
  --shadow-1:0 1px 2px rgba(0,0,0,0.40); --shadow-2:0 4px 14px rgba(0,0,0,0.45);
  --shadow-3:0 12px 32px rgba(0,0,0,0.55); --shadow-sheet:0 -8px 32px rgba(0,0,0,0.55);
  --glow-signal:0 0 0 1px var(--signal-600),0 0 18px var(--signal-glow);
  --glow-flee:0 0 0 1px var(--out-flee),0 0 20px var(--out-flee-glow);
  --inset-hairline:inset 0 0 0 1px var(--border-default);
  --ease-out:cubic-bezier(0.22,1,0.36,1); --ease-inout:cubic-bezier(0.65,0,0.35,1);
  --dur-fast:120ms; --dur-base:200ms; --dur-slow:320ms;
}

*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;height:100%;max-width:100%;overflow-x:hidden;touch-action:pan-y;}
html{ -webkit-text-size-adjust:100%; text-size-adjust:100%; }
body{
  background:radial-gradient(120% 90% at 50% 0%,#14181f 0%,var(--slate-950) 70%);
  min-height:100vh; min-height:100dvh; display:flex; align-items:center; justify-content:center;
  font-family:var(--font-ui); color:var(--text-primary); -webkit-font-smoothing:antialiased;
  touch-action:pan-y;            /* only vertical scrolling — no horizontal pan, no pinch-zoom */
  overscroll-behavior:none;      /* no rubber-band / scroll-chaining */
}
::-webkit-scrollbar{width:0;height:0;} *{scrollbar-width:none;}
button{font-family:inherit;}
@keyframes augur-pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes augur-grow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

@media (min-width:431px){ body{padding:24px;box-sizing:border-box;} }

/* Floating dice button — above the tab bar, bottom-right. */
.augur-fab{position:absolute;right:16px;bottom:90px;z-index:45;transition:transform var(--dur-fast) var(--ease-out);}
.augur-fab:active{transform:scale(0.92);}

/* ── Real phone / any touch device: drop the fixed-height device shell and
   let the document scroll naturally (bulletproof on iOS Safari). The tab bar
   is pinned with position:fixed; content reserves space for it. Triggered by a
   narrow viewport OR a coarse pointer, so big Pro-Max phones (>430px) qualify. ── */
@media (max-width:560px), (pointer:coarse){
  html,body{height:auto;}
  body{display:block;padding:0;min-height:100dvh;}
  .augur-frame{
    width:100%!important;max-width:100vw!important;height:auto!important;min-height:100dvh!important;
    border:none!important;border-radius:0!important;box-shadow:none!important;
    display:block!important;overflow-x:hidden!important;overflow-y:visible!important;
  }
  .augur-content{display:block!important;flex:none!important;overflow-x:hidden!important;overflow-y:visible!important;min-height:0!important;max-width:100%!important;}
  .augur-body{overflow-x:hidden!important;overflow-y:visible!important;height:auto!important;flex:none!important;max-width:100%!important;}
  /* tab bar fixed to the bottom of the viewport */
  .augur-tabbar{position:fixed!important;left:0;right:0;bottom:0;z-index:40;}
  /* keep the last content/action bar clear of the fixed tab bar */
  .augur-content{padding-bottom:calc(64px + var(--safe-bottom))!important;}
  /* modal sheets must cover the viewport, not the (now tall) frame */
  .augur-sheet{position:fixed!important;}
  /* floating dice button pinned above the fixed tab bar */
  .augur-fab{position:fixed!important;right:16px;bottom:calc(74px + var(--safe-bottom))!important;}
}
</style>

<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="https://unpkg.com/lucide@latest"></script>

<!-- Real Old World data (local copies of the TOW en 1 datasets, kept beside
     this file so the app works from file:// and any preview server). -->
<script src="./unit_db.js"></script>
<script src="./owb_unit_data.js"></script>
<script src="./augur_al.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, Fragment } = React;
// Render modal overlays at <body> level so position:fixed always resolves to
// the viewport (never to the tall mobile frame) — fixes sheet scroll & buttons.
const Portal = ({ children }) => ReactDOM.createPortal(children, document.body);

/* ════════════════════════════════════════════════════════════════
   0 · DATA ADAPTER
   Merge UNIT_DB (stats, save, special rules) with OWB_UNIT_DATA
   (points, French names). The engine needs stats; VP needs points.
   ════════════════════════════════════════════════════════════════ */

const FACTIONS = {
  'beastmen-brayherds':'Beastmen Brayherds', 'chaos-dwarfs':'Chaos Dwarfs',
  'daemons-of-chaos':'Daemons of Chaos', 'dark-elves':'Dark Elves',
  'dwarfen-mountain-holds':'Dwarfen Mountain Holds', 'empire-of-man':'Empire of Man',
  'grand-cathay':'Grand Cathay', 'high-elf-realms':'High Elf Realms',
  'kingdom-of-bretonnia':'Kingdom of Bretonnia', 'lizardmen':'Lizardmen',
  'ogre-kingdoms':'Ogre Kingdoms', 'orc-and-goblin-tribes':'Orc & Goblin Tribes',
  'skaven':'Skaven', 'tomb-kings-of-khemri':'Tomb Kings of Khemri',
  'vampire-counts':'Vampire Counts', 'warriors-of-chaos':'Warriors of Chaos',
  'wood-elf-realms':'Wood Elf Realms', 'realms-of-men':'Realms of Men',
  'regiments-of-renown':'Regiments of Renown',
};

const num = (x) => {
  if (x == null) return 0;
  const m = String(x).match(/-?\d+/);
  return m ? parseInt(m[0], 10) : 0;
};
const DIACRITICS = new RegExp('[̀-ͯ]', 'g');
const normName = (s) => String(s || '').toLowerCase()
  .normalize('NFD').replace(DIACRITICS, '')
  .replace(/[^a-z0-9]+/g, ' ').trim();

// Parse a save string like "4+", "2+", "—", "-" → number 2..7 (7 = no save)
const parseSave = (s) => {
  const n = num(s);
  return (n >= 1 && n <= 6) ? n : 7;
};

// Pick the most combat-relevant profile (one that actually fights).
function pickCombatProfile(profiles) {
  if (!profiles || !profiles.length) return null;
  let p = profiles[0];
  for (const c of profiles) { if (num(c.WS) > 0 && num(c.A) > 0) { p = c; break; } }
  return p;
}
function profileFromRaw(p) {
  return {
    M: num(p.M), ws: num(p.WS), bs: num(p.BS), s: num(p.S),
    t: num(p.T), w: Math.max(1, num(p.W) || 1), i: num(p.I),
    a: Math.max(1, num(p.A) || 1), ld: num(p.Ld) || 7,
  };
}
const rulesOf = (u) => (u.specialRules || []).map(r => r.slug || normName(r.name));

// Resolve an engine-ready unit straight from a UNIT_DB slug (used by JSON import,
// where the TOW en 1 builder stores units keyed by UNIT_DB slug + count + ppm).
function engineUnitFromSlug(slug, name, count, ppm) {
  if (typeof UNIT_DB === 'undefined') return null;
  let u = UNIT_DB[slug];
  if (!u) { // tolerate minor slug drift
    const want = normName(slug.replace(/-/g, ' '));
    for (const k in UNIT_DB) { if (k === slug || normName(UNIT_DB[k].name) === want) { u = UNIT_DB[k]; break; } }
  }
  if (!u) return null;
  const p = pickCombatProfile(u.profiles); if (!p) return null;
  const rules = rulesOf(u);
  return {
    id: slug, name: name || u.name, army: u.army, category: u.category || '',
    profile: profileFromRaw(p), save: parseSave(u.armourValue),
    points: ppm || 0, size: count || num(u.unitSize) || 1,
    rules, unbreakable: rules.includes('unbreakable'),
  };
}

/* ════════════════════════════════════════════════════════════════
   EQUIPMENT / MOUNT → STATS  (generic Old World rules, all armies)
   Equipment effects are shared across armies, so one rule set covers
   every faction. Magic items / unique gear fall through to the manual
   overrides in the config sheet.
   ════════════════════════════════════════════════════════════════ */

// Find a mount's stat profile in UNIT_DB by its (FR/EN) name.
function findMountProfile(name) {
  if (!name || typeof UNIT_DB === 'undefined') return null;
  const nn = normName(name).replace(/^(a pied|on foot)$/, '');
  if (!nn || /^(a pied|on foot)$/.test(normName(name))) return null;
  let best = null;
  for (const k in UNIT_DB) {
    const un = normName(UNIT_DB[k].name);
    if (un === nn || nn.includes(un) || un.includes(nn)) {
      const p = pickCombatProfile(UNIT_DB[k].profiles);
      if (p) { best = profileFromRaw(p); if (un === nn) break; }
    }
  }
  return best;
}

// Apply selected option NAMES (+ optional mount name) on top of a base
// { profile, save } → modified engine stats. Returns deltas + notes.
function resolveEquipment(base, chosenNames, mountName) {
  const all = (chosenNames || []).map(normName);
  const has = (re) => all.some(s => re.test(s));
  const prof = { ...base.profile };
  let strikeLast = false, strikeFirst = false, chargeS = 0;
  const notes = [];
  const mountedName = mountName && !/^(a pied|on foot)$/.test(normName(mountName)) ? mountName : null;

  // ── Melee weapons ──
  if (has(/arme de base additionnelle|additional hand weapon|second hand weapon|deux armes|paire d|paired weapons/)) {
    prof.a += 1; notes.push('+1 A · additional hand weapon');
  }
  if (has(/arme lourde|great weapon|grande arme/)) {
    prof.s += 2; strikeLast = true; notes.push('+2 S · strikes last · great weapon');
  }
  if (has(/hallebarde|halberd/)) { prof.s += 1; notes.push('+1 S · halberd'); }
  if (has(/fleau|flail/)) { prof.s += 2; notes.push('+2 S (1st round) · flail'); }
  if (has(/lance de joute|lance de cavalerie|cavalry spear|^lance$|\blance\b/) && mountedName) {
    chargeS += 2; notes.push('+2 S on the charge · lance');
  }
  if (has(/morning star|etoile du matin|masse a deux mains/)) { prof.s += 1; notes.push('+1 S'); }

  // ── Armour save (recomputed from selected pieces, never worse than base) ──
  let armourBase = 7;
  if (has(/plate|plates|caparacon complet/)) armourBase = 4;
  else if (has(/lourde|heavy/)) armourBase = 5;
  else if (has(/legere|light/)) armourBase = 6;
  let save = armourBase;
  const improve = (s) => (s >= 7 ? 6 : s - 1);
  if (has(/bouclier|shield/)) save = improve(save);
  if (mountedName) save = save >= 7 ? 7 : save - 1;
  if (mountedName && /caparac|barded|barding/.test(normName(mountName))) save = save >= 7 ? 7 : save - 1;
  save = save >= 7 ? 7 : Math.max(2, save);
  const hadArmourOpt = has(/plate|lourde|heavy|legere|light|bouclier|shield/) || !!mountedName;
  // keep the better (lower) of computed vs curated base save
  let finalSave = hadArmourOpt ? Math.min(save, base.save === 7 ? save : base.save) : base.save;

  // ── Mount: movement + extra attacks (approx: added at the rider's Strength) ──
  if (mountedName) {
    const mp = findMountProfile(mountName);
    if (mp) {
      if (mp.M > prof.M) prof.M = mp.M;
      if (mp.a > 0) { prof.a += mp.a; notes.push('+' + mp.a + ' A · mount'); }
    } else {
      prof.a += 1; notes.push('+1 A · mount');
    }
  }

  return { profile: prof, save: finalSave, strikeLast, strikeFirst, chargeS, notes };
}

// Build the playable roster from the army-list data (AUGUR_AL, extracted from
// TOW en 1): for each army → each list category → resolve the unit's stats from
// UNIT_DB (via slug aliases) and enrich points / FR name from OWB when present.
const ROSTER_CATS = ['characters','core','special','rare','mercenaries'];
function rosterUnitFromUDB(army, cat, slug, displayName) {
  const resolveKey = (s) => {
    const a = (typeof augurResolveSlug === 'function') ? augurResolveSlug(s) : s;
    return UNIT_DB[a] ? a : (UNIT_DB[s] ? s : null);
  };
  const key = resolveKey(slug); if (!key) return null;
  const u = UNIT_DB[key]; const p = pickCombatProfile(u.profiles); if (!p) return null;
  const owb = (typeof OWB_UNIT_DATA !== 'undefined') ? (OWB_UNIT_DATA[slug] || OWB_UNIT_DATA[key] || null) : null;
  const clean = (n) => String(n || '').replace(/\s*\([^)]*\)\s*$/, '').trim();
  const rules = rulesOf(u);
  return {
    id: army + '/' + slug, udbKey: key, slug,
    name: clean(displayName) || u.name,
    army, category: cat,
    points: (owb && owb.points) || 0,
    size: num(u.unitSize) || 1, save: parseSave(u.armourValue),
    profile: profileFromRaw(p), rules,
    unbreakable: rules.includes('unbreakable'),
    strikeFirst: rules.some(r => /strike-first|always-strikes-first/.test(r)),
    strikeLast: rules.some(r => /always-strikes-last/.test(r)),
  };
}
function buildRoster() {
  const hasAL = typeof AUGUR_AL !== 'undefined', hasUDB = typeof UNIT_DB !== 'undefined';
  if (!hasUDB) return { units: [], byArmy: {}, coverage: 0 };
  const units = [], seen = new Set();
  if (hasAL) {
    for (const army in AUGUR_AL) {
      for (const cat of ROSTER_CATS) {
        const arr = AUGUR_AL[army][cat]; if (!Array.isArray(arr)) continue;
        for (const entry of arr) {
          if (!entry || !entry.s) continue;
          const unit = rosterUnitFromUDB(army, cat, entry.s, entry.n);
          if (!unit || seen.has(unit.id)) continue;
          seen.add(unit.id); units.push(unit);
        }
      }
    }
  } else {
    // fallback: stats-only roster straight from UNIT_DB
    for (const k in UNIT_DB) {
      const u = UNIT_DB[k]; const p = pickCombatProfile(u.profiles); if (!p) continue;
      const rules = rulesOf(u);
      units.push({ id: k, udbKey: k, slug: k, name: u.name, army: u.army, category: (u.category||'core').toLowerCase(),
        points: 0, size: num(u.unitSize) || 1, save: parseSave(u.armourValue), profile: profileFromRaw(p), rules,
        unbreakable: rules.includes('unbreakable') });
    }
  }
  const byArmy = {};
  for (const u of units) (byArmy[u.army] = byArmy[u.army] || []).push(u);
  return { units, byArmy, coverage: units.length };
}

const ROSTER = buildRoster();
const armyUnits = (army) => ROSTER.byArmy[army] || [];
const armyList = () => Object.keys(FACTIONS).filter(a => (ROSTER.byArmy[a] || []).length);

/* ── Army-list variants: Armies of Infamy + Renegade (Legacy) ── */
const slugifyRule = (n) => String(n||'').toLowerCase().replace(/\([^)]*\)/g,'').trim().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
function variantsFor(army) {
  const out = [{ key:'standard', name:'Standard' }];
  if (typeof AUGUR_INFAMY !== 'undefined' && AUGUR_INFAMY[army] && Array.isArray(AUGUR_INFAMY[army].lists))
    AUGUR_INFAMY[army].lists.forEach(l => out.push({ key:'inf:'+l.key, name:l.name }));
  if (typeof AUGUR_RENEGADE_ARMIES !== 'undefined' && AUGUR_RENEGADE_ARMIES.indexOf(army) >= 0)
    out.push({ key:'renegade', name:'Renegade (Legacy)' });
  return out;
}
// Apply a Renegade unit override (stat changes + added/removed rules) to a roster unit.
function applyRenegade(unit, ov) {
  if (!ov) return unit;
  const p = { ...unit.profile };
  if (ov.stats) { const map = { M:'M', W:'w', I:'i', WS:'ws', BS:'bs', S:'s', T:'t', A:'a', Ld:'ld' };
    for (const k in ov.stats) { const tk = map[k]; if (tk) p[tk] = num(ov.stats[k]); } }
  let rules = [...unit.rules];
  if (Array.isArray(ov.removeRules)) rules = rules.filter(r => !ov.removeRules.some(rr => slugifyRule(rr) === r));
  if (Array.isArray(ov.addRules)) ov.addRules.forEach(r => { const s = slugifyRule(r.name); if (s && !rules.includes(s)) rules.push(s); });
  return { ...unit, profile: p, rules,
    unbreakable: rules.includes('unbreakable'),
    strikeFirst: rules.some(r => /strike-first|always-strikes-first/.test(r)),
    strikeLast: rules.some(r => /always-strikes-last/.test(r)) };
}
// Roster for an army under a given variant key ('standard' | 'renegade' | 'inf:<key>').
function armyRoster(army, variant) {
  variant = variant || 'standard';
  const base = ROSTER.byArmy[army] || [];
  if (variant === 'standard') return base;
  if (variant === 'renegade') {
    const ov = (typeof AUGUR_RENEGADE !== 'undefined' && AUGUR_RENEGADE[army] && AUGUR_RENEGADE[army].units) || {};
    return base.map(u => applyRenegade(u, ov[u.slug] || ov[u.udbKey]));
  }
  if (variant.indexOf('inf:') === 0 && typeof AUGUR_INFAMY !== 'undefined') {
    const key = variant.slice(4);
    const list = ((AUGUR_INFAMY[army] && AUGUR_INFAMY[army].lists) || []).find(l => l.key === key);
    if (!list || !list.roster) return base;
    const units = [], seen = new Set();
    for (const cat of ROSTER_CATS) {
      const arr = list.roster[cat]; if (!Array.isArray(arr)) continue;
      for (const slug of arr) { const u = rosterUnitFromUDB(army, cat, slug, null); if (!u || seen.has(u.id)) continue; seen.add(u.id); units.push(u); }
    }
    return units.length ? units : base;
  }
  return base;
}

/* ════════════════════════════════════════════════════════════════
   1 · COMBAT ENGINE  (Monte-Carlo, Old World close combat)
   A model, not a full rules engine — the README flags stat/prob
   values as illustrative. The math below is genuine Old World:
   WS-vs-WS to-hit, S-vs-T to-wound, save w/ Strength modifier,
   static combat resolution, break test on Ld, pursuit → VP.
   ════════════════════════════════════════════════════════════════ */

const d6 = () => (Math.random() * 6 | 0) + 1;
const roll2d6 = () => d6() + d6();

// Generic dice roll with Old World mechanics: N dice of X sides, keep the
// highest/lowest K (drop the rest), an arithmetic modifier, and reroll-1s.
function rollDiceSet({ count = 2, sides = 6, keep = 0, keepMode = 'all', mod = 0, rerollOnes = false }) {
  count = Math.max(1, count | 0); sides = Math.max(2, sides | 0);
  let dice = Array.from({ length: count }, () => (Math.random() * sides | 0) + 1);
  if (rerollOnes) dice = dice.map(d => d === 1 ? (Math.random() * sides | 0) + 1 : d);
  let keptSet;
  if (keepMode !== 'all' && keep > 0 && keep < count) {
    const order = dice.map((v, i) => ({ v, i })).sort((a, b) => a.v - b.v);
    const chosen = keepMode === 'highest' ? order.slice(count - keep) : order.slice(0, keep);
    keptSet = new Set(chosen.map(o => o.i));
  } else keptSet = new Set(dice.map((_, i) => i));
  const total = dice.reduce((s, v, i) => keptSet.has(i) ? s + v : s, 0) + (mod || 0);
  return { dice, kept: [...keptSet], total };
}

// To-hit: attacker WS vs defender WS (classic table)
function toHitTarget(aWS, dWS) {
  if (aWS <= 0) aWS = 1; if (dWS <= 0) dWS = 1;
  if (aWS > dWS) return 3;
  if (dWS >= 2 * aWS) return 5;
  return 4;
}
// To-wound: Strength vs Toughness. Returns 2..6, or 7 = impossible.
function toWoundTarget(s, t) {
  const diff = s - t;
  let need = 4 - diff;
  if (need < 2) need = 2;
  if (need > 6) return diff <= -3 ? 7 : 6;
  return need;
}
// Effective save after Strength armour-penetration modifier.
function effectiveSave(save, s) {
  if (save >= 7) return 7;
  const mod = Math.max(0, s - 3); // S4 -1, S5 -2, ...
  const eff = save + mod;
  return eff > 6 ? 7 : eff;
}

// Combat-relevant special-rule flags derived from a unit's rule slugs.
function combatFlags(u) {
  const r = (u && u.rules) || [];
  const has = (...s) => s.some(x => r.includes(x));
  // Armour Piercing from rule (in addition to Strength-based save reduction)
  const ap = has('cleaving-blow', 'obsidian-blades') ? 2
           : has('armour-bane', 'gromril-weapons', 'ensorcelled-weapons', 'khopesh') ? 1 : 0;
  return {
    hatred:        has('hatred', 'eternal-hatred', 'ancestral-grudge'),
    poisoned:      has('poisoned-attacks', 'warpstone-weapons'),
    killingBlow:   has('killing-blow', 'heroic-killing-blow', 'cleaving-blow', 'whirlwind-of-death', 'slayer'),
    regen:         has('regeneration', 'too-horrible-to-die'),
    flaming:       has('flaming-attacks', 'blazing-body', 'born-of-fire', 'wreathed-in-flame'),
    frenzy:        has('frenzy', 'blood-rage', 'primal-fury', 'blood-greed', 'foe-render', 'bestial-fury', 'blood-frenzy', 'gorefeast'),
    furiousCharge: has('furious-charge', 'daemonic-charge', 'devastating-charge'),
    swiftstride:   has('swiftstride'),
    fear:          has('fear'),
    terror:        has('terror'),
    immunePsych:   has('immune-to-psychology', 'daemonic', 'necromantic-undead', 'nehekharan-undead', 'unstable', 'tree-spirit'),
    stubborn:      has('stubborn', 'resolute', 'immovable-object', 'indomitable', 'shieldwall', 'steadfast-discipline'),
    unbreakable:   has('unbreakable'),
    coldBlooded:   has('cold-blooded'),
    strikeFirst:   has('strike-first', 'elven-reflexes', 'first-charge', 'martial-prowess'),
    strikeLast:    has('strike-last', 'cumbersome', 'ponderous'),
    unstable:      has('unstable', 'daemonic-instability', 'necromantic-undead', 'nehekharan-undead', 'daemonic'),
    multiWounds:   has('multiple-wounds'),
    impactHits:    has('impact-hits', 'bull-charge', 'ogre-charge', 'thunderous-charge', 'mournfang-charge',
                       'tusker-charge', 'bestial-charge', 'slavering-charge', 'stampede', 'brazen-wheels', 'crushing-bulk'),
    stomp:         has('stomp-attacks'),
    ap,
    ward:          wardFromRules(r),
  };
}

// Auto-detect an invulnerable (ward) save from special rules, returning the
// best (lowest) value found, or 0 if none. Magic-item wards are still manual.
function wardFromRules(r) {
  const has = (...s) => s.some(x => r.includes(x));
  let w = 0; const set = (v) => { if (v && (!w || v < w)) w = v; };
  if (has('daemonic')) set(5);                                              // Daemonic ward
  if (has('blessings-of-the-lady', 'the-grail-vow', 'grail-reliquae')) set(5);
  if (has('aura-of-the-lady', 'shield-of-the-lady', 'the-knights-vow', 'the-questing-vow')) set(6);
  if (has('feel-no-pain')) set(6);
  if (has('witness-to-destiny', 'blessings-of-asuryan', 'lileaths-blessing', 'favour-of-the-goddess')) set(6);
  if (has('runes-of-warding', 'runes-of-protection', 'dark-runes', 'arcane-shield')) set(5);
  if (has('mark-of-tzeentch', 'infernal-favour')) set(5);
  if (has('ethereal')) set(0);                                             // ethereal handled via save, not ward here
  return w;
}

// Roll a unit's attacks against a defender → unsaved wounds inflicted.
// `o` carries the attacker's offensive rule flags + the defender's regen/ward.
function resolveAttacks(att, def, nAttacks, o = {}) {
  const hitT = Math.min(6, toHitTarget(att.ws, def.ws) + (o.hitPenalty || 0)); // Fear: −1 to hit
  const woundT = toWoundTarget(att.s, def.t);
  const saveT = effectiveSave(def.save, att.s + (o.ap || 0)); // Armour Bane / Cleaving Blow add extra AP
  const wardT = def.ward || 0;        // invulnerable save (magic items), 0 = none
  const regenNegated = o.flaming;     // flaming attacks negate regeneration
  const multi = o.multiWounds && def.w > 1; // multiple wounds only matter vs multi-wound models
  let unsaved = 0;
  for (let i = 0; i < nAttacks; i++) {
    let hit = d6();
    if (hit < hitT) { if (o.hatred) hit = d6(); if (hit < hitT) continue; } // Hatred: reroll a miss
    let killing = false, autoWound = o.poisoned && hit === 6; // Poisoned: natural 6 to hit auto-wounds
    if (!autoWound) {
      if (woundT === 7) continue;
      const wr = d6();
      if (wr < woundT) continue;
      if (o.killingBlow && wr === 6) killing = true;          // Killing Blow: ignore armour save
    }
    if (!killing && saveT <= 6 && d6() >= saveT) continue;    // armour save
    if (wardT && d6() >= wardT) continue;                     // invulnerable / ward save
    if (o.regen && !regenNegated && d6() >= 4) continue;       // Regeneration 4+ ward
    unsaved += multi ? Math.min(def.w, 1 + (Math.random() * 3 | 0)) : 1; // Multiple Wounds (≈D3)
  }
  return unsaved;
}

// Auto-hits (Impact Hits on the charge, Stomp each round): N hits at the
// attacker's Strength that skip the to-hit roll. Returns unsaved wounds.
function autoHits(att, def, n, o = {}) {
  const woundT = toWoundTarget(att.s, def.t);
  if (woundT === 7 || n <= 0) return 0;
  const saveT = effectiveSave(def.save, att.s + (o.ap || 0));
  const wardT = def.ward || 0;
  let unsaved = 0;
  for (let i = 0; i < n; i++) {
    if (d6() < woundT) continue;
    if (saveT <= 6 && d6() >= saveT) continue;
    if (wardT && d6() >= wardT) continue;
    if (o.regen && !o.flaming && d6() >= 4) continue;
    unsaved++;
  }
  return unsaved;
}

// Map a single combat to a per-unit outcome bucket for THIS unit.
//  win | draw | give (lost, held) | fallback (broke, escaped) | flee (broke, caught)
function classify(myRes, foeRes, broke, caught) {
  if (myRes > foeRes) return 'win';
  if (myRes === foeRes) return 'draw';
  if (!broke) return 'give';       // lost combat but passed break — holds
  return caught ? 'flee' : 'fallback';
}

// One iteration. Returns { meOut, foeOut, vpSwing }.
function simulateOnce(cfg) {
  const me = cfg.me, foe = cfg.foe;

  // Special case: charging a unit that is already fleeing → no melee, it is
  // run down (caught) on a pursuit roll; otherwise it escapes off the table edge.
  if (cfg.fleeingTarget) {
    const caught = roll2d6() >= roll2d6();
    return {
      meOut: 'win', foeOut: caught ? 'flee' : 'fallback',
      vpSwing: caught ? lossPoints(foe, foe.size * foe.profile.w, true) : 0,
    };
  }

  // Special-rule flags for both sides.
  const fm = combatFlags(me), ff = combatFlags(foe);
  const meImm  = fm.immunePsych || fm.frenzy || fm.unstable;   // ignores Fear/Terror
  const foeImm = ff.immunePsych || ff.frenzy || ff.unstable;

  // Terror: a unit charged by a terror-causer it isn't immune to tests Ld; on a
  // fail it flees before contact — no melee, the charger may run it down.
  const terrorFlee = (def, charged, cf, imm) => charged && cf.terror && !imm && roll2d6() > def.profile.ld;
  if (terrorFlee(foe, cfg.myCharged, fm, foeImm)) {
    const caught = pursuitCatch(fm.swiftstride, ff.swiftstride);
    return { meOut:'win', foeOut: caught?'flee':'fallback', vpSwing: caught ? lossPoints(foe, foe.size*foe.profile.w, true) : 0 };
  }
  if (terrorFlee(me, cfg.foeCharged, ff, meImm)) {
    const caught = pursuitCatch(ff.swiftstride, fm.swiftstride);
    return { meOut: caught?'flee':'fallback', foeOut:'win', vpSwing: caught ? -lossPoints(me, me.size*me.profile.w, true) : 0 };
  }
  // Fear: a unit facing a fear/terror-causer (not immune) tests Ld; a failure
  // leaves it shaken → −1 to hit this combat.
  const fearPen = (def, imm, cf) => (cf.fear || cf.terror) && !imm && roll2d6() > def.profile.ld ? 1 : 0;
  const myHitPen = fearPen(me, meImm, ff), foeHitPen = fearPen(foe, foeImm, fm);

  // Effective profiles: Frenzy → +1 A; charge → Strength from lance + Furious Charge.
  const meEff  = { ...me.profile,  a: me.profile.a  + (fm.frenzy ? 1 : 0),
    s: me.profile.s  + (cfg.myCharged  ? ((me.chargeS  || 0) + (fm.furiousCharge ? 1 : 0)) : 0) };
  const foeEff = { ...foe.profile, a: foe.profile.a + (ff.frenzy ? 1 : 0),
    s: foe.profile.s + (cfg.foeCharged ? ((foe.chargeS || 0) + (ff.furiousCharge ? 1 : 0)) : 0) };
  const meAPM  = Math.max(1, meEff.a), foeAPM = Math.max(1, foeEff.a);
  // Defender packs carry save + invulnerable ward + wounds-per-model.
  const dMe  = { ...meEff,  save: me.save,  ward: me.ward  || fm.ward || 0, w: me.profile.w };
  const dFoe = { ...foeEff, save: foe.save, ward: foe.ward || ff.ward || 0, w: foe.profile.w };
  // Offensive rule packs (defender's regen travels with the attacker call).
  const offMe  = { hatred:fm.hatred, poisoned:fm.poisoned, killingBlow:fm.killingBlow, flaming:fm.flaming, regen:ff.regen, multiWounds:fm.multiWounds, ap:fm.ap, hitPenalty:myHitPen };
  const offFoe = { hatred:ff.hatred, poisoned:ff.poisoned, killingBlow:ff.killingBlow, flaming:ff.flaming, regen:fm.regen, multiWounds:ff.multiWounds, ap:ff.ap, hitPenalty:foeHitPen };
  // Strike order from Initiative (+ strike first/last from rules).
  const ei = (u, f) => u.profile.i + ((u.strikeFirst || f.strikeFirst) ? 20 : 0) - ((u.strikeLast || f.strikeLast) ? 20 : 0);
  const eiMe = ei(me, fm), eiFoe = ei(foe, ff);
  let myAtt = cfg.myAttacks, foeAtt = cfg.foeAttacks, myWounds, foeWounds;
  if (eiMe === eiFoe) {                       // simultaneous
    myWounds  = resolveAttacks(meEff,  dFoe, myAtt, offMe);
    foeWounds = resolveAttacks(foeEff, dMe,  foeAtt, offFoe);
  } else if (eiMe > eiFoe) {                  // I strike first → my casualties cut the foe's return
    myWounds  = resolveAttacks(meEff, dFoe, myAtt, offMe);
    foeAtt = Math.max(0, foeAtt - Math.floor(myWounds / Math.max(1, foe.profile.w)) * foeAPM);
    foeWounds = resolveAttacks(foeEff, dMe, foeAtt, offFoe);
  } else {                                    // foe strikes first
    foeWounds = resolveAttacks(foeEff, dMe, foeAtt, offFoe);
    myAtt = Math.max(0, myAtt - Math.floor(foeWounds / Math.max(1, me.profile.w)) * meAPM);
    myWounds = resolveAttacks(meEff, dFoe, myAtt, offMe);
  }
  // Impact Hits (on the charge) + Stomp (large creatures, every round) → auto-hits.
  if (cfg.myCharged  && fm.impactHits) myWounds  += autoHits(meEff,  dFoe, 1 + (Math.random()*6|0), offMe);
  if (cfg.foeCharged && ff.impactHits) foeWounds += autoHits(foeEff, dMe,  1 + (Math.random()*6|0), offFoe);
  if (fm.stomp) myWounds  += autoHits(meEff,  dFoe, 1 + (Math.random()*3|0), offMe);
  if (ff.stomp) foeWounds += autoHits(foeEff, dMe,  1 + (Math.random()*3|0), offFoe);

  const myRes  = myWounds  + cfg.myStatic;
  const foeRes = foeWounds + cfg.foeStatic;
  const diff = Math.abs(myRes - foeRes);

  // Loser resolution: Unstable units crumble (extra wounds = the result
  // difference, no save, no flee) instead of testing; others take a break test
  // (Stubborn ignores the modifier, Cold-Blooded rolls 3D6 dropping the highest,
  // Unbreakable auto-holds, double-1 always holds).
  const coldRoll = () => { const d = [d6(), d6(), d6()].sort((a, b) => a - b); return d[0] + d[1]; };
  const resolveLoser = (loser, lf, winnerSwift) => {
    if (lf.unstable) return { broke: false, caught: false, crumble: diff };
    if (loser.unbreakable || lf.unbreakable) return { broke: false, caught: false, crumble: 0 };
    const target = Math.max(2, lf.stubborn ? loser.profile.ld : loser.profile.ld - diff);
    const roll = lf.coldBlooded ? coldRoll() : roll2d6();
    const broke = roll !== 2 && roll > target;
    return { broke, caught: broke ? pursuitCatch(winnerSwift, lf.swiftstride) : false, crumble: 0 };
  };
  let meBroke=false, foeBroke=false, meCaught=false, foeCaught=false, meCrumble=0, foeCrumble=0;
  if (myRes > foeRes)      { const b = resolveLoser(foe, ff, fm.swiftstride); foeBroke=b.broke; foeCaught=b.caught; foeCrumble=b.crumble; }
  else if (foeRes > myRes) { const b = resolveLoser(me, fm, ff.swiftstride); meBroke=b.broke; meCaught=b.caught; meCrumble=b.crumble; }

  const meOut  = classify(myRes, foeRes, meBroke, meCaught);
  const foeOut = classify(foeRes, myRes, foeBroke, foeCaught);

  // VP swing = enemy points lost − my points lost (combat wounds + crumble, or
  // the whole unit if caught fleeing).
  const foeLost = lossPoints(foe, myWounds + foeCrumble, foeCaught);
  const myLost  = lossPoints(me, foeWounds + meCrumble, meCaught);
  // Casualties = unsaved wounds I deal to the foe / take myself (incl. crumble).
  return { meOut, foeOut, vpSwing: foeLost - myLost,
           foeWoundsTaken: myWounds + foeCrumble, myWoundsTaken: foeWounds + meCrumble };
}

// Pursuit catch: both roll 2D6 (Swiftstride rolls 3D6 and keeps the best two).
// The fleeing unit is run down if the pursuit roll ≥ the flee roll.
function pursuitCatch(pursuerSwift, fleerSwift) {
  const mv = (sw) => sw ? (() => { const d = [d6(), d6(), d6()].sort((a, b) => b - a); return d[0] + d[1]; })() : roll2d6();
  return mv(pursuerSwift) >= mv(fleerSwift);
}

// Points lost: unsaved wounds × points-per-wound, capped at the unit's value.
// If caught in pursuit, the whole unit is destroyed.
function lossPoints(unit, wounds, caught) {
  const total = unit.points * unit.size;             // approx unit value
  if (caught) return total;
  const ppw = (unit.points * unit.size) / Math.max(1, unit.size * unit.profile.w);
  return Math.min(total, Math.round(wounds * ppw));
}

function monteCarlo(cfg, N = 8000) {
  const tally = {
    me:  { win:0, draw:0, give:0, fallback:0, flee:0 },
    foe: { win:0, draw:0, give:0, fallback:0, flee:0 },
  };
  const swings = new Array(N);
  let sumInflict = 0, sumSuffer = 0; // unsaved wounds dealt to foe / taken by me
  for (let i = 0; i < N; i++) {
    const r = simulateOnce(cfg);
    tally.me[r.meOut]++; tally.foe[r.foeOut]++;
    swings[i] = r.vpSwing;
    sumInflict += r.foeWoundsTaken; sumSuffer += r.myWoundsTaken;
  }
  const dist = (t) => {
    const o = {}; for (const k in t) o[k] = t[k] / N; return o;
  };
  swings.sort((a, b) => a - b);
  const pct = (p) => swings[Math.min(N - 1, Math.max(0, Math.floor(p * N)))];
  const mean = Math.round(swings.reduce((s, v) => s + v, 0) / N);
  const meDist = dist(tally.me), foeDist = dist(tally.foe);
  const myWinProb = meDist.win + meDist.draw * 0.5;
  const badExchange = myWinProb > 0.6 && mean < 60 && (cfg.foe.unbreakable || foeDist.flee < 0.2);
  const wMe = (cfg.me.profile && cfg.me.profile.w) || 1;
  const wFoe = (cfg.foe.profile && cfg.foe.profile.w) || 1;
  const inflictW = sumInflict / N, sufferW = sumSuffer / N;
  return {
    expectedVP: mean,
    range: [Math.round(pct(0.10)), Math.round(pct(0.90))],
    me: meDist, foe: foeDist,
    badExchange,
    casualties: {
      inflictWounds: inflictW, sufferWounds: sufferW,         // avg unsaved wounds
      inflictModels: inflictW / wFoe, sufferModels: sufferW / wMe, // ≈ models slain
    },
    N,
  };
}

// Static combat resolution for one side, from its factor block `s` and the
// opponent's `o` (a flank/rear attack cancels the opponent's rank bonus).
// `charged` = this side benefits from a charge (charger or counter-charge).
function sideStatic(s, o, charged) {
  const oppNegatesRanks = (o && o.flankRear > 0);
  let cr = 0;
  if (!oppNegatesRanks && s.ranks > 1) cr += Math.min(s.ranks - 1, 3); // +1/rank, max +3
  if (s.banner) cr += 1;
  if (s.warbanner) cr += 1;
  cr += (s.flankRear || 0);          // flank +1, rear +2
  if (s.highGround) cr += 1;
  if (charged) cr += 1;              // charge bonus
  cr += Math.min(5, s.overkill || 0); // overkill in a challenge, max +5
  return cr;
}

/* ════════════════════════════════════════════════════════════════
   2 · UI PRIMITIVES  (faithful to the Augur design system)
   ════════════════════════════════════════════════════════════════ */
const Icon = ({ name, size = 20, color, style = {} }) =>
  <i data-lucide={name} style={{ width: size, height: size, color, ...style }} />;

function Button({ children, variant='primary', size='md', icon=null, block=false, disabled=false, style={}, ...rest }) {
  const [pressed, setPressed] = useState(false);
  const sizes = { md:{height:'var(--touch-comfy)',font:'var(--fs-body)',pad:'0 var(--sp-5)'},
                  lg:{height:'var(--touch-large)',font:'var(--fs-h3)',pad:'0 var(--sp-6)'} };
  const variants = {
    primary:{background:'var(--signal-500)',color:'var(--text-on-signal)',border:'1px solid transparent'},
    secondary:{background:'var(--surface-3)',color:'var(--text-primary)',border:'1px solid var(--border-default)'},
    ghost:{background:'transparent',color:'var(--text-secondary)',border:'1px solid transparent'},
    danger:{background:'var(--out-flee-soft)',color:'var(--out-flee)',border:'1px solid var(--out-flee)'},
  };
  const s = sizes[size]||sizes.md, v = variants[variant]||variants.primary;
  return <button type="button" disabled={disabled}
    onPointerDown={()=>setPressed(true)} onPointerUp={()=>setPressed(false)} onPointerLeave={()=>setPressed(false)}
    style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:'var(--sp-2)',
      height:s.height,padding:s.pad,width:block?'100%':'auto',
      font:`var(--fw-semibold) ${s.font}/1 var(--font-ui)`,letterSpacing:'0.01em',borderRadius:'var(--r-md)',
      cursor:disabled?'not-allowed':'pointer',
      transition:'transform var(--dur-fast) var(--ease-out),filter var(--dur-fast) var(--ease-out),background var(--dur-fast)',
      transform:pressed&&!disabled?'scale(0.97)':'scale(1)',filter:pressed&&!disabled?'brightness(0.92)':'none',
      opacity:disabled?0.4:1,...v,...style}} {...rest}>{icon}{children}</button>;
}

function Stepper({ value, onChange=()=>{}, min=0, max=99, step=1, label=null, signed=false, size='md', style={} }) {
  const h = size==='lg'?'var(--touch-large)':'var(--touch-comfy)';
  const clamp = (n)=>Math.max(min,Math.min(max,n));
  const display = signed&&value>0?`+${value}`:`${value}`;
  const btn = (dir,glyph)=>(
    <button type="button" aria-label={dir>0?'augmenter':'diminuer'}
      onClick={()=>onChange(clamp(value+dir*step))} disabled={dir>0?value>=max:value<=min}
      style={{width:h,height:h,flex:'none',display:'flex',alignItems:'center',justifyContent:'center',
        background:'transparent',border:'none',cursor:'pointer',color:'var(--text-primary)',fontSize:'22px',
        opacity:(dir>0?value>=max:value<=min)?0.3:1,borderRadius:'var(--r-md)'}}>{glyph}</button>);
  return <div style={style}>
    {label&&<div style={{font:'var(--fw-semibold) var(--fs-label)/1 var(--font-ui)',letterSpacing:'var(--ls-label)',
      textTransform:'uppercase',color:'var(--text-tertiary)',marginBottom:'var(--sp-2)'}}>{label}</div>}
    <div style={{display:'flex',alignItems:'center',background:'var(--surface-3)',borderRadius:'var(--r-md)',
      border:'1px solid var(--border-default)'}}>
      {btn(-1,'−')}
      <div style={{flex:1,textAlign:'center',minWidth:'40px',font:'var(--fw-semibold) var(--fs-h3)/1 var(--font-mono)',
        color:'var(--text-primary)',fontVariantNumeric:'tabular-nums'}}>{display}</div>
      {btn(1,'+')}
    </div></div>;
}

function Switch({ checked=false, onChange=()=>{}, label=null, disabled=false, style={} }) {
  const track = <span role="switch" aria-checked={checked} onClick={()=>!disabled&&onChange(!checked)}
    style={{width:'52px',height:'30px',flex:'none',borderRadius:'var(--r-pill)',
      background:checked?'var(--signal-500)':'var(--surface-3)',
      border:`1px solid ${checked?'var(--signal-500)':'var(--border-strong)'}`,position:'relative',
      cursor:disabled?'not-allowed':'pointer',transition:'background var(--dur-base) var(--ease-out)',opacity:disabled?0.4:1}}>
    <span style={{position:'absolute',top:'3px',left:checked?'24px':'3px',width:'24px',height:'24px',

/* Reusable dice roller — manual or in-app, with keep/drop, modifier, reroll-1s.
   Opened from the floating dice button on any screen. */
const DICE_PRESETS = [
  { key:'2d6',  label:'2D6',        cfg:{count:2,sides:6,keep:2,keepMode:'all',    mod:0,rerollOnes:false} },
  { key:'cold', label:'Sang-froid', cfg:{count:3,sides:6,keep:2,keepMode:'lowest', mod:0,rerollOnes:false} },
  { key:'1d6',  label:'1D6',        cfg:{count:1,sides:6,keep:1,keepMode:'all',    mod:0,rerollOnes:false} },
  { key:'3h2',  label:'3D6 ↑2',     cfg:{count:3,sides:6,keep:2,keepMode:'highest',mod:0,rerollOnes:false} },
  { key:'low',  label:'2D6 ↓1',     cfg:{count:2,sides:6,keep:1,keepMode:'lowest', mod:0,rerollOnes:false} },
];
function DiceRoller({ open, onClose }) {
  const [cfg, setCfg] = useState({ count:2, sides:6, keep:2, keepMode:'all', mod:0, rerollOnes:false });
  const [result, setResult] = useState(null);
  useEffect(()=>{ if(open) setResult(null); }, [open]);
  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });
  if (!open) return null;
  const set = (p) => { setCfg(c => ({ ...c, ...p })); setResult(null); };
  const roll = () => setResult(rollDiceSet(cfg));
  const keepLabel = { all:'all', highest:'highest', lowest:'lowest' };
  return <Portal><div className="augur-sheet" onClick={onClose} style={{position:'fixed',inset:0,zIndex:60,display:'flex',
    flexDirection:'column',justifyContent:'flex-end',background:'rgba(4,6,9,0.6)',backdropFilter:'blur(2px)'}}>
    <div onClick={e=>e.stopPropagation()} style={{background:'var(--surface-1)',borderTopLeftRadius:'var(--r-xl)',
      borderTopRightRadius:'var(--r-xl)',borderTop:'2px solid var(--signal-500)',boxShadow:'var(--shadow-sheet)',
      maxHeight:'88dvh',display:'flex',flexDirection:'column',padding:'var(--sp-4)'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <span style={{font:'600 var(--fs-h3)/1 var(--font-display)',color:'var(--text-primary)'}}>Roll dice</span>
        <button type="button" onClick={onClose} style={{background:'transparent',border:'none',cursor:'pointer',color:'var(--text-tertiary)',display:'flex'}}><Icon name="x" size={22}/></button></div>
      <div style={{flex:1,minHeight:0,overflowY:'auto',WebkitOverflowScrolling:'touch',display:'flex',flexDirection:'column',gap:'var(--sp-3)'}}>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {DICE_PRESETS.map(p=><ChipToggle key={p.key} label={p.label}
            on={cfg.count===p.cfg.count&&cfg.keepMode===p.cfg.keepMode&&cfg.keep===p.cfg.keep&&cfg.sides===p.cfg.sides}
            onClick={()=>{ setCfg({...p.cfg}); setResult(null); }}/>)}
        </div>
        <div style={{display:'flex',gap:8}}>
          <Stepper label="Dice" value={cfg.count} onChange={v=>set({count:v})} min={1} max={12} style={{flex:1}}/>
          <Stepper label="Sides" value={cfg.sides} onChange={v=>set({sides:v})} min={2} max={20} style={{flex:1}}/>
          <Stepper label="Modifier" value={cfg.mod} onChange={v=>set({mod:v})} min={-12} max={12} signed style={{flex:1}}/>
        </div>
        <div><SectionLabel>Keep dice</SectionLabel>
          <Segmented size="sm" value={cfg.keepMode} onChange={v=>set({keepMode:v})}
            options={[{value:'all',label:'All'},{value:'highest',label:'Highest'},{value:'lowest',label:'Lowest'}]}/></div>
        {cfg.keepMode!=='all' && <Stepper label={'How many to keep ('+keepLabel[cfg.keepMode]+')'} value={cfg.keep}
          onChange={v=>set({keep:v})} min={1} max={Math.max(1,cfg.count-1)}/>}
        <div style={{display:'flex',gap:6}}>
          <ChipToggle label="Reroll 1s" on={cfg.rerollOnes} onClick={()=>set({rerollOnes:!cfg.rerollOnes})}/>
        </div>
        {result && <div style={{background:'var(--surface-2)',border:'1px solid var(--border-default)',borderRadius:'var(--r-md)',
          padding:'var(--sp-4)',display:'flex',flexDirection:'column',alignItems:'center',gap:10}}>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'center'}}>
            {result.dice.map((v,i)=>{const kept=result.kept.includes(i);
              return <span key={i} style={{width:40,height:40,display:'flex',alignItems:'center',justifyContent:'center',
                borderRadius:'var(--r-sm)',font:'700 var(--fs-h2)/1 var(--font-mono)',
                background:kept?'var(--signal-soft)':'var(--surface-3)',
                border:`1px solid ${kept?'var(--signal-500)':'var(--border-subtle)'}`,
                color:kept?'var(--signal-300)':'var(--text-disabled)',
                opacity:kept?1:0.5,textDecoration:kept?'none':'line-through'}}>{v}</span>;})}
            {cfg.mod!==0 && <span style={{alignSelf:'center',font:'600 var(--fs-h3)/1 var(--font-mono)',color:'var(--text-secondary)'}}>{cfg.mod>0?'+':'−'}{Math.abs(cfg.mod)}</span>}
          </div>
          <div style={{font:'700 var(--fs-hero)/1 var(--font-display)',color:'var(--signal-400)',fontVariantNumeric:'tabular-nums'}}>{result.total}</div>
        </div>}
      </div>
      <div style={{flex:'none',paddingTop:10}}>
        <Button variant="primary" size="lg" block onClick={roll} icon={<Icon name="dices" size={22}/>}>
          {result ? 'Reroll' : 'Roll'}</Button>
      </div>
    </div></div></Portal>;

const STORE_KEY = 'augur.game.v1';
const DEFAULT_MY_ARMY = armyList().includes('kingdom-of-bretonnia') ? 'kingdom-of-bretonnia' : armyList()[0];
const DEFAULT_FOE_ARMY = armyList().includes('orc-and-goblin-tribes') ? 'orc-and-goblin-tribes' : (armyList()[1] || armyList()[0]);

function freshGame() {
  const myA = DEFAULT_MY_ARMY, foeA = DEFAULT_FOE_ARMY;
  const pick = (army, n) => armyUnits(army).slice(0, n).map(u => ({
    ref: u.id, army, name: u.name, points: u.points, size: u.size,
    fuCurrent: u.size, fuMax: u.size, status: 'full',
  }));
  return {
    myArmy: myA, foeArmy: foeA, myVariant: 'standard', foeVariant: 'standard',
    myRoster: pick(myA, 5), foeRoster: pick(foeA, 5),
    objectives: [
      { id:'o1', name:'Centre field', holder:'none' },
      { id:'o2', name:'East hill',    holder:'none' },
      { id:'o3', name:'Bridge',       holder:'none' },
    ],
    turn: 1, mission: 'Pitched Battle', pointsCap: 2000,
  };
}
function loadGame() {
  let g = freshGame();
  try { const raw = localStorage.getItem(STORE_KEY); if (raw) g = { ...g, ...JSON.parse(raw) }; }
  catch (e) {}
  // self-heal corrupted/stale army slugs so the catalog is never empty
  if (!armyUnits(g.myArmy).length)  g.myArmy  = DEFAULT_MY_ARMY;
  if (!armyUnits(g.foeArmy).length) g.foeArmy = DEFAULT_FOE_ARMY;
  return g;
}

  const p = unit.profile;
  const stats = [['CC',p.ws],['F',p.s],['E',p.t],['A',p.a],['Svg',unit.save>=7?'—':unit.save+'+'],['Cd',p.ld]];
  return <div style={{display:'flex',gap:5,marginTop:8}}>
    {stats.map(([k,v])=><StatPill key={k} label={k} value={v} style={{flex:1,minWidth:0}}/>)}
  </div>;
}

/* Resolve the engine-ready candidate units for one side, in either source mode. */
function listCandidates(list, sideKey) {
  if (!list) return [];
  return (list.units || []).map((u, ui) => {
    const ppm = u.ppm || Math.round((u.pts || 0) / Math.max(1, u.count || 1));
    const e = engineUnitFromSlug(u.slug, u.name, u.count, ppm);
    if (!e) return null;
    e.id = sideKey + ':' + ui;
    e.sub = (u.pts ? u.pts + ' pts' : '') + (u.count ? ' · ' + u.count + ' fig.' : '');
    // Apply equipment → stats: baked from the config sheet (u.eng), or parsed
    // from an imported list's option labels as a best effort.
    if (u.eng) {
      e.profile = { ...e.profile, ...u.eng.profile };
      e.save = u.eng.save; e.strikeLast = u.eng.strikeLast;
      e.strikeFirst = u.eng.strikeFirst; e.chargeS = u.eng.chargeS || 0; e.ward = u.eng.ward || 0;
    } else if (u.opts && u.opts.length) {
      const mount = u.opts.find(o => /mont|cheval|destrier|warhorse|pegas|griffon|dragon|char|sanglier|loup/i.test(o));
      const r = resolveEquipment({ profile: e.profile, save: e.save }, u.opts, mount || null);
      e.profile = r.profile; e.save = r.save;
      e.strikeLast = r.strikeLast; e.strikeFirst = r.strikeFirst; e.chargeS = r.chargeS;
    }
    return e;
  }).filter(Boolean);
}
function candidatesFor(side, sel, game, lists) {
  if (sel.source === 'lists') {
    const li = side === 'me' ? sel.myList : sel.foeList;
    return listCandidates(lists[li], side);
  }
  const army = side === 'me' ? game.myArmy : game.foeArmy;
  const variant = side === 'me' ? game.myVariant : game.foeVariant;
  return armyRoster(army, variant).map(u => ({ ...u, sub: (u.points ? u.points + ' pts' : '') + ' · ' + (u.category || '') }));
}
function resolveUnit(side, sel, game, lists) {
  const cands = candidatesFor(side, sel, game, lists);
  const id = side === 'me' ? sel.mine : sel.foe;
  return cands.find(c => c.id === id) || cands[0] || null;
}

/* Toggle / radio row for a unit option (with its points). */

/* Configure a catalog unit's options + count, then add it to a list. */
function UnitConfig({ unit, side, lists, accent, onBack, onQuickUse, onAdd }) {
  const owb = (typeof OWB_UNIT_DATA !== 'undefined' && (OWB_UNIT_DATA[unit.slug] || OWB_UNIT_DATA[unit.udbKey] || OWB_UNIT_DATA[unit.id])) || {};
  const eq = owb.equip || [], ar = owb.armor || [], mo = owb.mounts || [], op = owb.opts || [], cm = owb.command || [];
  const defActive = (arr) => { const i = arr.findIndex(x => x.active); return i >= 0 ? i : (arr.length ? 0 : -1); };
  const [count, setCount]   = useState(unit.size || 1);
  const [ppm, setPpm]       = useState(owb.points || unit.points || 0);
  const [equipI, setEquipI] = useState(defActive(eq));
  const [armorI, setArmorI] = useState(defActive(ar));
  const [mountI, setMountI] = useState(defActive(mo));
  const [optsSet, setOptsSet] = useState(() => new Set(op.map((o,i)=>o.active?i:-1).filter(i=>i>=0)));
  const [cmdSet, setCmdSet]   = useState(() => new Set());
  const [dSave, setDSave]     = useState(0);  // manual: +1 = save améliorée d'1
  const [dA, setDA]           = useState(0);  // manual: attaques en plus / figurine
  const [dS, setDS]           = useState(0);  // manual: Force +/-
  const [ward, setWard]       = useState(0);  // manual: invulnerable save target (0/1 = none)
  const [target, setTarget]   = useState(() => lists.length ? 0 : 'new');
  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });

  const perM  = (o) => (o.points||0) * count;                 // equip/armor/mount = per model
  const optPM = (o) => o.perModel ? (o.points||0)*count : (o.points||0);
  let total = count*ppm;
  total += equipI>=0&&eq[equipI] ? perM(eq[equipI]) : 0;
  total += armorI>=0&&ar[armorI] ? perM(ar[armorI]) : 0;
  total += mountI>=0&&mo[mountI] ? perM(mo[mountI]) : 0;
  total += [...optsSet].reduce((s,i)=>s+optPM(op[i]),0);
  total += [...cmdSet].reduce((s,i)=>s+(cm[i].points||0),0);

  const toggle = (set,setSet,i) => { const n=new Set(set); n.has(i)?n.delete(i):n.add(i); setSet(n); };

  // ── Resolve the real combat profile from the selected equipment + mount ──
  const names = (o) => o ? [o.name_fr, o.name_en] : [];
  const chosenNames = [
    ...names(eq[equipI]), ...names(ar[armorI]),
    ...[...optsSet].flatMap(i=>names(op[i])), ...[...cmdSet].flatMap(i=>names(cm[i])),
  ];
  const mountName = (mountI>=0 && mo[mountI]) ? (mo[mountI].name_fr || mo[mountI].name_en) : null;
  const eqRes = resolveEquipment({ profile: unit.profile, save: unit.save }, chosenNames, mountName);
  const applySave = (base, d) => d ? Math.max(2, Math.min(7, (base===7 && d>0 ? 7 : base) - d)) : base;
  const eng = {
    profile: { ...eqRes.profile, a: Math.max(1, eqRes.profile.a + dA), s: Math.max(1, eqRes.profile.s + dS) },
    save: applySave(eqRes.save, dSave),
    strikeLast: eqRes.strikeLast || (unit.rules||[]).includes('always-strikes-last'),
    strikeFirst: eqRes.strikeFirst || (unit.rules||[]).some(r=>/strike-first|always-strikes-first/.test(r)),
    chargeS: eqRes.chargeS,
    ward: ward >= 2 ? ward : 0,
  };
  const engNotes = eqRes.notes.slice();
  if (eng.ward) engNotes.push('ward ' + eng.ward + '+');
  if (eng.strikeFirst) engNotes.push('strikes first');

  const buildEntry = () => {
    const chosen = [];
    if (eq[equipI]&&eq[equipI].points) chosen.push(eq[equipI].name_fr);
    if (ar[armorI]&&ar[armorI].points) chosen.push(ar[armorI].name_fr);
    if (mo[mountI]&&mo[mountI].points) chosen.push(mo[mountI].name_fr);
    [...optsSet].forEach(i=>chosen.push(op[i].name_fr));
    [...cmdSet].forEach(i=>chosen.push(cm[i].name_fr));
    return { slug: unit.udbKey||unit.id, name: unit.name, cat: unit.category||'core',
      count, ppm, optsPts: total-count*ppm, opts: chosen, pts: total, eng };
  };

  const Group = ({ title, items, radio, sel, onSel }) => items.length ? <div>
    <SectionLabel>{title}</SectionLabel>
    <div style={{display:'flex',flexDirection:'column',gap:5}}>
      {items.map((o,i)=><OptRow key={i} label={o.name_fr||o.name_en} radio={radio}
        pts={o.points||0} on={radio?sel===i:sel.has(i)} onClick={()=>onSel(i)}/>)}
    </div></div> : null;

  const tgtOptions = [...lists.map((l,i)=>({value:String(i),label:l.name||('List '+(i+1))})),{value:'new',label:'➕ New list'}];

  return <Portal><div className="augur-sheet" onClick={onBack} style={{position:'fixed',inset:0,zIndex:51,display:'flex',flexDirection:'column',
    justifyContent:'flex-end',background:'rgba(4,6,9,0.6)',backdropFilter:'blur(2px)'}}>
    <div onClick={e=>e.stopPropagation()} style={{background:'var(--surface-1)',borderTopLeftRadius:'var(--r-xl)',
      borderTopRightRadius:'var(--r-xl)',borderTop:`2px solid ${accent}`,boxShadow:'var(--shadow-sheet)',
      maxHeight:'90dvh',display:'flex',flexDirection:'column',padding:'var(--sp-4)'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
        <button type="button" onClick={onBack} style={{background:'transparent',border:'none',cursor:'pointer',color:'var(--text-tertiary)',display:'flex'}}><Icon name="chevron-left" size={22}/></button>
        <span style={{flex:1,font:'600 var(--fs-h3)/1.1 var(--font-display)',color:'var(--text-primary)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{unit.name}</span>
        <span style={{font:'700 var(--fs-h2)/1 var(--font-mono)',color:accent}}>{total} pts</span></div>
      <div style={{flex:1,minHeight:0,overflowY:'auto',WebkitOverflowScrolling:'touch',display:'flex',flexDirection:'column',gap:'var(--sp-3)'}}>
        <div>
          <SectionLabel style={{color:accent}}>Combat profile · with options</SectionLabel>
          <MiniProfile unit={{profile:eng.profile, save:eng.save}}/>
          {(engNotes.length>0 || eng.strikeLast || eng.chargeS>0) &&
            <div style={{marginTop:6,font:'500 var(--fs-xs)/1.4 var(--font-ui)',color:'var(--text-secondary)'}}>
              {[...engNotes, eng.strikeLast?'strikes last':null, eng.chargeS>0?('+'+eng.chargeS+' S on charge'):null].filter(Boolean).join(' · ')}</div>}
        </div>
        <div style={{display:'flex',gap:10}}>
          <Stepper label="Models" value={count} onChange={setCount} min={1} max={80} style={{flex:1}}/>
          <Stepper label="Pts / model" value={ppm} onChange={setPpm} min={0} max={600} step={1} style={{flex:1}}/>
        </div>
        <Group title="Weapon" items={eq} radio sel={equipI} onSel={setEquipI}/>
        <Group title="Armour" items={ar} radio sel={armorI} onSel={setArmorI}/>
        <Group title="Mount" items={mo} radio sel={mountI} onSel={setMountI}/>
        <Group title="Command" items={cm} sel={cmdSet} onSel={i=>toggle(cmdSet,setCmdSet,i)}/>
        <Group title="Options" items={op} sel={optsSet} onSel={i=>toggle(optsSet,setOptsSet,i)}/>
        <div>
          <SectionLabel>Manual adjustment · items, special rules</SectionLabel>
          <div style={{display:'flex',gap:8}}>
            <Stepper label="Save" value={dSave} onChange={setDSave} min={-2} max={4} signed style={{flex:1}}/>
            <Stepper label="Attacks" value={dA} onChange={setDA} min={0} max={8} signed style={{flex:1}}/>
            <Stepper label="Strength" value={dS} onChange={setDS} min={-2} max={4} signed style={{flex:1}}/>
          </div>
          <Stepper label="Ward save (0 = none)" value={ward} onChange={setWard} min={0} max={6}/>
        </div>
        {!eq.length&&!ar.length&&!mo.length&&!op.length&&!cm.length&&
          <div style={{font:'400 var(--fs-sm)/1.4 var(--font-ui)',color:'var(--text-tertiary)'}}>No options listed — use the manual adjustments.</div>}
      </div>
      <div style={{flex:'none',paddingTop:10,display:'flex',flexDirection:'column',gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{font:'500 var(--fs-xs)/1 var(--font-ui)',color:'var(--text-tertiary)',flex:'none'}}>Add to</span>
          <select value={String(target)} onChange={e=>setTarget(e.target.value)} style={{flex:1,appearance:'none',
            background:'var(--surface-3)',color:'var(--text-primary)',border:'1px solid var(--border-default)',
            borderRadius:'var(--r-sm)',padding:'8px var(--sp-3)',font:'600 var(--fs-sm)/1 var(--font-ui)',cursor:'pointer'}}>
            {tgtOptions.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</select></div>
        <div style={{display:'flex',gap:8}}>
          <Button variant="secondary" onClick={onQuickUse} style={{flex:'none'}}>Use (base)</Button>
          <Button variant="primary" block onClick={()=>onAdd(buildEntry(), target==='new'?'new':+target)}
            icon={<Icon name="plus" size={18}/>}>Add to list</Button></div>
      </div>
    </div></div></Portal>;
}

/* Modal bottom-sheet unit picker with search — clearly shows the selected unit. */

];
const catOf = (u) => { const c = String(u.category||'').toLowerCase();
  if (/charact|personn|hero|lord|seigneur/.test(c)) return 'characters';
  if (/merc/.test(c)) return 'mercenaries';
  if (/special|spécia/.test(c)) return 'special';
  if (/rare/.test(c)) return 'rare';

    <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',padding:'2px 2px 0'}}>

        {charged?'Has the charge (+1)':'No charge'}</span>
      <span style={{font:'700 var(--fs-h3)/1 var(--font-mono)',color:accent}}>Static result +{cr}</span></div>
  </Collapsible>;
}

// Special rules that visibly drive the combat engine, with short effect labels.
const RULE_LABELS = {
  strikeFirst:'Strikes first', strikeLast:'Strikes last', hatred:'Hatred · reroll to hit',
  frenzy:'Frenzy · +1 A', furiousCharge:'Furious Charge · +1 S charge', poisoned:'Poisoned · 6 = wound',
  killingBlow:'Killing Blow · ignore save', regen:'Regeneration · 4+ ward', swiftstride:'Swiftstride',
  impactHits:'Impact Hits', stomp:'Stomp', multiWounds:'Multiple Wounds',
  fear:'Fear', terror:'Terror · may cause flee', unstable:'Unstable · crumble', immunePsych:'Immune to Psychology',
  stubborn:'Stubborn · ignore modifier', unbreakable:'Unbreakable', coldBlooded:'Cold-Blooded', flaming:'Flaming Attacks',
};
const ORDER_RULES = ['strikeFirst','strikeLast','hatred','frenzy','furiousCharge','poisoned','killingBlow','ap','regen','multiWounds','impactHits','stomp','ward','swiftstride','coldBlooded','stubborn','unbreakable','unstable','immunePsych','fear','terror','flaming'];
function ruleChipLabel(k, f) {
  if (k === 'ap')   return 'Armour Piercing −' + f.ap;
  if (k === 'ward') return 'Ward ' + f.ward + '+';
  return RULE_LABELS[k];
}
function RuleChips({ unit, accent }) {
  if (!unit) return null;
  const f = combatFlags(unit);
  const active = ORDER_RULES.filter(k => f[k]);
  if (!active.length) return <span style={{font:'400 var(--fs-xs)/1.4 var(--font-ui)',color:'var(--text-tertiary)'}}>No notable combat rule detected.</span>;
  return <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
    {active.map(k => <span key={k} style={{font:'600 var(--fs-label)/1 var(--font-ui)',letterSpacing:'0.02em',
      background:'var(--surface-3)',border:`1px solid ${accent}55`,color:accent,borderRadius:'var(--r-pill)',padding:'5px 9px',whiteSpace:'nowrap'}}>{ruleChipLabel(k, f)}</span>)}
  </div>;
}

function CombatSelect({ game, setGame, sel, setSel, lists, onImport, onAddUnit, onSimulate }) {
  const [sheet, setSheet] = useState(null); // 'me' | 'foe' | null
  const set = (patch) => setSel(s => ({ ...s, ...patch }));
  const setF = (side) => (patch) => setSel(s => ({ ...s, [side]: { ...s[side], ...patch } }));
  const fileRef = useRef(null);

  const myUnit  = resolveUnit('me', sel, game, lists);
  const foeUnit = resolveUnit('foe', sel, game, lists);
  const myCands  = candidatesFor('me', sel, game, lists);
  const foeCands = candidatesFor('foe', sel, game, lists);

  const myCharged  = sel.charger==='me'  || (sel.counterCharge && sel.charger==='foe');
  const foeCharged = sel.charger==='foe' || (sel.counterCharge && sel.charger==='me');
  const myCR  = sideStatic(sel.me,  sel.foe, myCharged);
  const foeCR = sideStatic(sel.foe, sel.me,  foeCharged);

    <Body>
      {/* source mode */}

      {sel.source==='catalog' ? (
        <div style={{display:'flex',gap:8}}>
          {['me','foe'].map(sd=>{
            const aKey=sd==='me'?'myArmy':'foeArmy', vKey=sd==='me'?'myVariant':'foeVariant';
            const army=game[aKey], variant=game[vKey], accent=sd==='me'?'var(--signal-600)':'var(--out-flee)';
            const vars=variantsFor(army);
            const setArmy=(a)=>{ setGame(g=>({...g,[aKey]:a,[vKey]:'standard'})); set(sd==='me'?{mine:(armyRoster(a,'standard')[0]||{}).id}:{foe:(armyRoster(a,'standard')[0]||{}).id}); };
            const setVar=(v)=>{ setGame(g=>({...g,[vKey]:v})); set(sd==='me'?{mine:(armyRoster(army,v)[0]||{}).id}:{foe:(armyRoster(army,v)[0]||{}).id}); };
            return <div key={sd} style={{flex:1,display:'flex',flexDirection:'column',gap:6}}>
              <SectionLabel>{sd==='me'?'Your army':'Enemy army'}</SectionLabel>
              <ArmySelect value={army} accent={accent} onChange={setArmy}/>
              {vars.length>1 && <select value={variant} onChange={e=>setVar(e.target.value)}
                style={{appearance:'none',WebkitAppearance:'none',width:'100%',background:'var(--surface-2)',
                  color:variant==='standard'?'var(--text-secondary)':accent,border:`1px solid ${variant==='standard'?'var(--border-default)':accent}`,
                  borderRadius:'var(--r-md)',padding:'8px var(--sp-3)',font:'600 var(--fs-xs)/1 var(--font-ui)',cursor:'pointer'}}>
                {vars.map(v=><option key={v.key} value={v.key} style={{background:'var(--surface-2)',color:'var(--text-primary)'}}>{v.name}</option>)}</select>}
            </div>;
          })}
        </div>
      ) : (
        <Card elevation={1} style={{padding:'var(--sp-3) var(--sp-4)',display:'flex',flexDirection:'column',gap:'var(--sp-3)'}}>
          {lists.length===0 ? (
            <div style={{font:'400 var(--fs-sm)/1.5 var(--font-ui)',color:'var(--text-secondary)'}}>

          ) : (
            <div style={{display:'flex',gap:8}}>
              <div style={{flex:1}}><SectionLabel>Your list</SectionLabel>
                <select value={sel.myList} onChange={e=>{const i=+e.target.value;set({myList:i,mine:'me:0'});}}
                  style={{appearance:'none',width:'100%',background:'var(--surface-2)',color:'var(--text-primary)',
                    border:'1px solid var(--signal-600)',borderRadius:'var(--r-md)',padding:'10px var(--sp-3)',

              <div style={{flex:1}}><SectionLabel>Enemy list</SectionLabel>
                <select value={sel.foeList} onChange={e=>{const i=+e.target.value;set({foeList:i,foe:'foe:0'});}}
                  style={{appearance:'none',width:'100%',background:'var(--surface-2)',color:'var(--text-primary)',
                    border:'1px solid var(--out-flee)',borderRadius:'var(--r-md)',padding:'10px var(--sp-3)',
                    font:'600 var(--fs-sm)/1 var(--font-ui)',cursor:'pointer'}}>
                  {lists.map((l,i)=><option key={i} value={i}>{l.name||('List '+(i+1))}</option>)}</select></div>
            </div>

          <input ref={fileRef} type="file" accept=".json,application/json" style={{display:'none'}}
            onChange={e=>{const f=e.target.files[0];if(f)onImport(f);e.target.value='';}}/>
          <Button variant="secondary" block onClick={()=>fileRef.current&&fileRef.current.click()}
            icon={<Icon name="upload" size={18}/>}>Import a list (.json)</Button>

      <SideSelector label="Your unit" accent={accentMe} unit={myUnit} onOpen={()=>setSheet('me')}/>

      <div style={{display:'flex',alignItems:'center',gap:10,margin:'2px 0'}}>

        <span style={{flex:1,height:1,background:'var(--border-default)'}}/></div>

      <SideSelector label="Enemy unit" accent={accentFoe} unit={foeUnit} onOpen={()=>setSheet('foe')}/>

      {/* auto-detected combat rules from both units' special rules */}
      <Collapsible title="Active combat rules" icon="sparkles" accent="var(--signal-400)" defaultOpen={false}
        summary="auto">
        <div><SectionLabel style={{color:accentMe}}>{myUnit?myUnit.name:'Your unit'}</SectionLabel>
          <RuleChips unit={myUnit} accent="var(--signal-400)"/></div>
        <div><SectionLabel style={{color:accentFoe}}>{foeUnit?foeUnit.name:'Enemy unit'}</SectionLabel>
          <RuleChips unit={foeUnit} accent="var(--out-flee)"/></div>
        <div style={{font:'400 var(--fs-xs)/1.4 var(--font-ui)',color:'var(--text-tertiary)'}}>
          Detected from the unit's special rules (tow.whfb.app) and applied automatically by the engine.</div>
      </Collapsible>

      {/* charge & reactions */}
      <Collapsible title="Charge & reaction" icon="zap" accent="var(--caution)" defaultOpen={true}
        summary={sel.charger==='me'?'you charge':sel.charger==='foe'?'you are charged':'—'}>
        <div><SectionLabel>Who charges?</SectionLabel>
          <Segmented size="sm" value={sel.charger} onChange={v=>set({charger:v})}
            options={[{value:'me',label:'You'},{value:'none',label:'Nobody'},{value:'foe',label:'Enemy'}]}/></div>
        {sel.charger!=='none'&&<div><SectionLabel>Defender's reaction</SectionLabel>
          <Segmented size="sm" value={sel.reaction} onChange={v=>set({reaction:v})}
            options={[{value:'hold',label:'Hold'},{value:'standshoot',label:'Stand & shoot'},{value:'flee',label:'Flee'}]}/></div>}
        {sel.charger!=='none'&&sel.reaction==='standshoot'&&
          <div><Stepper label="Stand & shoot wounds (−charger attacks, +defender CR)" value={sel.standShootKills}
            onChange={v=>set({standShootKills:v})} min={0} max={20}/>
            <div style={{marginTop:4,font:'400 var(--fs-xs)/1.4 var(--font-ui)',color:'var(--text-tertiary)'}}>

        <Card elevation={3} style={{padding:'2px var(--sp-3)'}}>
          <Switch label="Counter-charge (defender also charges)" checked={sel.counterCharge} onChange={v=>set({counterCharge:v})}/>
          <div style={{height:1,background:'var(--border-subtle)'}}/>
          <Switch label="Target already fleeing (overrun)" checked={sel.fleeingTarget} onChange={v=>set({fleeingTarget:v})}/>
        </Card>
        {sel.charger!=='none'&&sel.reaction==='flee'&&
          <div style={{font:'400 var(--fs-xs)/1.4 var(--font-ui)',color:'var(--text-secondary)'}}>
            The defender tries to flee: the charge may fail. Tick « target already fleeing » to simulate the pursuit.</div>}
      </Collapsible>

      <FactorPanel side="me" accent={accentMe} f={sel.me} setF={setF('me')}
        attacks={sel.myAttacks} setAttacks={v=>set({myAttacks:v})} charged={myCharged} cr={myCR}/>
      <FactorPanel side="foe" accent={accentFoe} f={sel.foe} setF={setF('foe')}
        attacks={sel.foeAttacks} setAttacks={v=>set({foeAttacks:v})} charged={foeCharged} cr={foeCR}/>

      <div style={{height:4}}/>
    </Body>
    <BottomBar>
      <Button variant="primary" size="lg" block disabled={!myUnit||!foeUnit} onClick={onSimulate}
        icon={<Icon name="dices" size={22}/>}>Run the simulation</Button>
    </BottomBar>

    <UnitSheet open={sheet==='me'} title="Your unit" accent={accentMe} units={myCands}
      selectedId={sel.mine} onPick={id=>set({mine:id})} onClose={()=>setSheet(null)}
      configurable={sel.source==='catalog'} side="me" lists={lists} onAdd={onAddUnit}/>
    <UnitSheet open={sheet==='foe'} title="Enemy unit" accent={accentFoe} units={foeCands}
      selectedId={sel.foe} onPick={id=>set({foe:id})} onClose={()=>setSheet(null)}
      configurable={sel.source==='catalog'} side="foe" lists={lists} onAdd={onAddUnit}/>
  </Fragment>;
}

function BadExchangeBanner({ text }) {

function FleeDial({ label, value }) {
  const pct=Math.round(value*100);const r=26,c=2*Math.PI*r;const danger=pct>=30;
  const col=danger?'var(--out-flee)':'var(--out-draw)';

        <circle cx="32" cy="32" r={r} fill="none" stroke="var(--surface-3)" strokeWidth="6"/>
        <circle cx="32" cy="32" r={r} fill="none" stroke={col} strokeWidth="6" strokeLinecap="round"
          strokeDasharray={c} strokeDashoffset={c*(1-value)}
          style={{filter:danger?'drop-shadow(0 0 5px var(--out-flee-glow))':'none',transition:'stroke-dashoffset var(--dur-slow) var(--ease-out)'}}/>
      </svg>
      <span style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',

}
function VariantCadran({ res, names }) {

  const value=res.expectedVP,positive=value>=0,color=positive?'var(--positive)':'var(--danger)',range=res.range;
  return <Fragment>
    <Card elevation={2} style={{padding:'var(--sp-5)'}}>

function OutcomeColumn({ name, dist, side }) {

// Average casualties (models slain ≈ unsaved wounds / wounds-per-model), shown
// under every result view. Raw wounds in the sub-line for multi-wound models.

  const cell = (label, accent, models, wounds) =>
    <div style={{flex:1,display:'flex',flexDirection:'column',gap:2,alignItems:'center',textAlign:'center'}}>
      <span style={{font:'600 var(--fs-label)/1 var(--font-ui)',letterSpacing:'0.04em',textTransform:'uppercase',color:'var(--text-tertiary)'}}>{label}</span>

      <span style={{font:'400 var(--fs-xs)/1.2 var(--font-ui)',color:'var(--text-tertiary)'}}>{fmt(wounds)} wounds</span>
    </div>;
  return <Card elevation={1} style={{padding:'var(--sp-4) var(--sp-5)',marginTop:10}}>
    <div style={{font:'600 var(--fs-label)/1 var(--font-ui)',letterSpacing:'0.04em',textTransform:'uppercase',
      color:'var(--text-tertiary)',textAlign:'center',marginBottom:8}}>Average casualties per round</div>

}
