/* ════════════════════════════════════════════════════════════════
   7 · SCREEN 3 — Assistant de phase de combat
   ════════════════════════════════════════════════════════════════ */
const PHASES = [
  {key:'charge', n:1, title:'Charge & reaction', icon:'zap'},
  {key:'result', n:2, title:'Combat result', icon:'calculator'},
  {key:'break',  n:3, title:'Break test', icon:'dices'},
  {key:'pursue', n:4, title:'Pursuit', icon:'wind'},
];
function PhaseRail({ active }) {
  return <div style={{display:'flex',gap:6,padding:'0 var(--screen-pad)'}}>
    {PHASES.map((p,i)=><div key={p.key} style={{flex:1,height:4,borderRadius:'var(--r-pill)',
      background:i<=active?'var(--signal-500)':'var(--surface-3)',
      boxShadow:i===active?'var(--glow-signal)':'none',transition:'background var(--dur-base)'}}/>)}</div>;
}
const Q = ({ children }) => <div style={{font:'600 var(--fs-body)/1.3 var(--font-ui)',color:'var(--text-primary)',margin:'2px 0 2px'}}>{children}</div>;
function ChipToggle({ label, on, onClick }) {
  return <button type="button" onClick={onClick} style={{cursor:'pointer',whiteSpace:'nowrap',
    background:on?'var(--signal-soft)':'var(--surface-3)',border:`1px solid ${on?'var(--signal-500)':'var(--border-default)'}`,
    borderRadius:'var(--r-pill)',padding:'8px 12px',font:`${on?600:500} var(--fs-xs)/1 var(--font-ui)`,
    color:on?'var(--signal-300)':'var(--text-secondary)'}}>{label}</button>;
}
const ranksBonus = (r) => r>1 ? Math.min(r-1,3) : 0;
const crOf = (w,b,charged) => w + ranksBonus(b.ranks) + (b.banner?1:0) + (b.warbanner?1:0)
  + (b.flankRear||0) + (b.highGround?1:0) + (charged?1:0) + (b.extra||0);
const rulesHas = (u,re) => u && (u.rules||[]).some(r=>re.test(r));

// One side's combat-result bonus editor (pre-filled from the engagement config).
function BonusEditor({ bon, setBon, charged }) {
  const set=(p)=>setBon(b=>({...b,...p}));
  return <div style={{display:'flex',flexDirection:'column',gap:8}}>
    <div style={{display:'flex',gap:8}}>
      <Stepper label="Ranks" value={bon.ranks} onChange={v=>set({ranks:v})} min={1} max={10} style={{flex:1}}/>
      <Stepper label="Other (outnumber, overkill…)" value={bon.extra||0} onChange={v=>set({extra:v})} min={0} max={12} signed style={{flex:1}}/>
    </div>
    <Segmented size="sm" value={bon.flankRear||0} onChange={v=>set({flankRear:v})}
      options={[{value:0,label:'Front'},{value:1,label:'Flank +1'},{value:2,label:'Rear +2'}]}/>
    <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
      <ChipToggle label="Standard +1" on={bon.banner} onClick={()=>set({banner:!bon.banner})}/>
      <ChipToggle label="Battle Standard +1" on={bon.warbanner} onClick={()=>set({warbanner:!bon.warbanner})}/>
      <ChipToggle label="High ground +1" on={bon.highGround} onClick={()=>set({highGround:!bon.highGround})}/>
      {charged && <span style={{alignSelf:'center',font:'600 var(--fs-xs)/1 var(--font-ui)',color:'var(--out-win)'}}>Charge +1</span>}
    </div>
  </div>;
}

function CombatAssistant({ me, foe, sel, onDone }) {
  const meName = me ? me.name : 'Your unit', foeName = foe ? foe.name : 'Enemy unit';
  const [step, setStep] = useState(0);
  const [charger, setCharger]   = useState(sel.charger);
  const [reaction, setReaction] = useState(sel.reaction);
  const [myWounds, setMyWounds] = useState(0);
  const [foeWounds, setFoeWounds] = useState(0);
  const [myBon, setMyBon]   = useState({ ...sel.me, extra:0 });
  const [foeBon, setFoeBon] = useState({ ...sel.foe, extra:0 });
  const [stubborn, setStubborn] = useState(false);
  const [coldBlood, setColdBlood] = useState(false);
  const [reroll, setReroll] = useState(false);
  const [entry, setEntry] = useState(7);     // the 2D6 break-test total (entered or rolled)
  const [fleeRoll, setFleeRoll] = useState(9);
  const [pursueRoll, setPursueRoll] = useState(9);
  const phase = PHASES[step];
  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });

  const myCharged  = charger==='me'  || (sel.counterCharge && charger==='foe');
  const foeCharged = charger==='foe' || (sel.counterCharge && charger==='me');
  const myCR  = crOf(myWounds,  myBon,  myCharged);
  const foeCR = crOf(foeWounds, foeBon, foeCharged);
  const diff = myCR - foeCR;
  const loser = diff>0 ? 'foe' : diff<0 ? 'me' : null;
  const testUnit = loser==='me' ? me : loser==='foe' ? foe : null;
  const testName = loser==='me' ? meName : foeName;
  const testUnbreakable = loser==='me' ? sel.me.unbreakable : sel.foe.unbreakable;
  const cd = testUnit ? testUnit.profile.ld : 7;

  // Seed break-test special rules from the losing unit when entering that step.
  useEffect(()=>{
    if (phase.key==='break' && testUnit) {
      setStubborn(rulesHas(testUnit,/stubborn|tenace/));
      setColdBlood(rulesHas(testUnit,/cold-blooded|sang-froid/));
    }
  }, [step]);

  const modifier = stubborn ? 0 : Math.abs(diff);
  const target = Math.max(2, cd - modifier);
  const passed = testUnbreakable || entry <= target;
  const rollOne = () => coldBlood ? (() => { const d=[d6(),d6(),d6()].sort((a,b)=>a-b); return d[0]+d[1]; })() : roll2d6();
  const doRoll = () => { let r = rollOne(); if (reroll && !testUnbreakable && r > target) r = rollOne(); setEntry(r); };

  const next=()=>{ if(step<PHASES.length-1) setStep(step+1); else onDone&&onDone(); };
  const back=()=>step>0&&setStep(step-1);
  const Verdict = ({ ok, text, glow }) => <div style={{textAlign:'center',padding:'var(--sp-4)',borderRadius:'var(--r-md)',
    background:ok?'var(--out-win-soft)':'var(--out-flee-soft)',border:`1px solid ${ok?'var(--out-win)':'var(--out-flee)'}`,
    boxShadow:glow&&!ok?'var(--glow-flee)':'none',font:'600 var(--fs-h3)/1.2 var(--font-display)',
    color:ok?'var(--out-win)':'var(--out-flee)'}}>{text}</div>;

  return <Fragment>
    <ScreenHeader eyebrow={`Combat phase · ${phase.n} / 4`} title="Assistant"/>
    <PhaseRail active={step}/>
    <Body style={{paddingTop:14}}>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <span style={{width:44,height:44,flex:'none',display:'flex',alignItems:'center',justifyContent:'center',
          borderRadius:'var(--r-md)',background:'var(--signal-soft)',border:'1px solid var(--signal-600)'}}>
          <Icon name={phase.icon} size={22} color="var(--signal-400)"/></span>
        <div style={{font:'600 var(--fs-h2)/1.1 var(--font-display)',color:'var(--text-primary)'}}>{phase.title}</div></div>

      {/* ── 1 · CHARGE & RÉACTION ── */}
      {phase.key==='charge' && <Fragment>
        <Q>Who charged?</Q>
        <Segmented value={charger} onChange={setCharger}
          options={[{value:'me',label:'You'},{value:'none',label:'Nobody'},{value:'foe',label:'Enemy'}]}/>
        {charger!=='none' && <Fragment>
          <Q>Defender's reaction · {charger==='me'?foeName:meName}?</Q>
          <Segmented size="sm" value={reaction} onChange={setReaction}
            options={[{value:'hold',label:'Hold'},{value:'standshoot',label:'Stand & shoot'},{value:'flee',label:'Flee'}]}/>
          <div style={{background:'var(--surface-1)',border:'1px solid var(--border-subtle)',borderRadius:'var(--r-md)',
            padding:'var(--sp-3) var(--sp-4)',font:'400 var(--fs-sm)/1.5 var(--font-ui)',color:'var(--text-secondary)'}}>
            {reaction==='hold' && <span>The defender holds. The charger gains <b style={{color:'var(--out-win)'}}>+1</b> to the result (counted in the next step)<span> ; add its lance / impact wounds to the wounds.</span></span>}
            {reaction==='standshoot' && <span>The defender <b>shoots before contact</b>: remove the casualties first, then resolve the melee with the remaining models.</span>}
            {reaction==='flee' && <span>The defender <b>flees</b>. If the charge catches it, it is destroyed (go to the Pursuit step); otherwise the charge fails.</span>}
          </div>
        </Fragment>}
        {charger==='none' && <div style={{font:'400 var(--fs-sm)/1.5 var(--font-ui)',color:'var(--text-tertiary)'}}>Already locked in combat — no charge this turn.</div>}
      </Fragment>}

      {/* ── 2 · COMBAT RESULT ── */}
      {phase.key==='result' && <Fragment>
        <Q>How many unsaved wounds did each side inflict?</Q>
        <div style={{display:'flex',gap:10}}>
          <Stepper label={'Wounds · '+meName.split(/[ ,]/)[0]} value={myWounds} onChange={setMyWounds} min={0} max={40} style={{flex:1}}/>
          <Stepper label={'Wounds · '+foeName.split(/[ ,]/)[0]} value={foeWounds} onChange={setFoeWounds} min={0} max={40} style={{flex:1}}/>
        </div>
        <SectionLabel style={{color:'var(--signal-400)'}}>Bonuses · {meName}{myCharged?' (charge)':''} → CR {myCR}</SectionLabel>
        <BonusEditor bon={myBon} setBon={setMyBon} charged={myCharged}/>
        <SectionLabel style={{color:'var(--out-flee)'}}>Bonuses · {foeName}{foeCharged?' (charge)':''} → CR {foeCR}</SectionLabel>
        <BonusEditor bon={foeBon} setBon={setFoeBon} charged={foeCharged}/>
        <div style={{textAlign:'center',padding:'var(--sp-4)',background:'var(--surface-2)',borderRadius:'var(--r-md)',
          border:'1px solid var(--border-default)',marginTop:4}}>
          <div style={{font:'600 var(--fs-label)/1 var(--font-ui)',letterSpacing:'var(--ls-label)',textTransform:'uppercase',color:'var(--text-tertiary)'}}>Result difference</div>
          <div style={{font:'700 var(--fs-display)/1 var(--font-mono)',marginTop:4,
            color:loser==='foe'?'var(--positive)':loser==='me'?'var(--danger)':'var(--text-secondary)'}}>{diff>0?'+':''}{diff}</div>
          <div style={{font:'600 var(--fs-sm)/1.3 var(--font-ui)',color:'var(--text-secondary)',marginTop:4}}>
            {loser==='foe'?`You win — ${foeName} must test`:loser==='me'?`You lose — ${meName} must test`:'Draw — nobody tests'}</div>
        </div>
      </Fragment>}

      {/* ── 3 · BREAK TEST ── */}
      {phase.key==='break' && (loser===null ? (
        <div style={{font:'500 var(--fs-sm)/1.5 var(--font-ui)',color:'var(--text-secondary)'}}>Drawn result: no Break test required.</div>
      ) : <Fragment>
        <Q>{testName} must take a Leadership test.</Q>
        <div style={{display:'flex',justifyContent:'space-around',textAlign:'center',padding:'var(--sp-2) 0'}}>
          {[['Ld',cd,'var(--text-primary)'],['Modifier',(stubborn?'0':'−'+Math.abs(diff)),'var(--danger)'],['Target',testUnbreakable?'auto':'≤'+target,'var(--signal-400)']].map(([l,v,c])=>
            <div key={l}><div style={{font:'600 var(--fs-label)/1 var(--font-ui)',letterSpacing:'var(--ls-label)',textTransform:'uppercase',color:'var(--text-tertiary)'}}>{l}</div>
              <div style={{font:'700 var(--fs-h1)/1 var(--font-mono)',color:c,marginTop:4}}>{v}</div></div>)}
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          <ChipToggle label="Stubborn (ignore modifier)" on={stubborn} onClick={()=>setStubborn(!stubborn)}/>
          <ChipToggle label="Cold-Blooded (3D6, drop highest)" on={coldBlood} onClick={()=>setColdBlood(!coldBlood)}/>
          <ChipToggle label="Reroll (BSB / General)" on={reroll} onClick={()=>setReroll(!reroll)}/>
        </div>
        {testUnbreakable ? (
          <div style={{textAlign:'center',padding:'var(--sp-4)',background:'var(--out-give-soft)',border:'1px solid var(--caution)',
            borderRadius:'var(--r-md)',color:'var(--caution)',font:'600 var(--fs-body)/1.3 var(--font-ui)'}}>Unbreakable unit — automatic success, it holds.</div>
        ) : <Fragment>
          <Q>Dice roll — roll for real then enter, or roll in the app</Q>
          <div style={{display:'flex',gap:10,alignItems:'flex-end'}}>
            <Stepper label={coldBlood?'Total (2 lowest dice)':'Total 2D6'} value={entry} onChange={setEntry} min={2} max={12} style={{flex:1}}/>
            <Button variant="secondary" size="lg" onClick={doRoll} icon={<Icon name="dices" size={20}/>}>Roll</Button>
          </div>
          <Verdict ok={passed} glow text={passed?`Passed (${entry} ≤ ${target}) — the unit holds`:`Failed (${entry} > ${target}) — THE UNIT FLEES`}/>
        </Fragment>}
      </Fragment>)}

      {/* ── 4 · PURSUIT ── */}
      {phase.key==='pursue' && <Fragment>
        <Q>Did the unit flee? Compare its flee roll to the pursuit.</Q>
        <div style={{display:'flex',gap:10}}>
          <Stepper label="Flee distance (2D6)" value={fleeRoll} onChange={setFleeRoll} min={2} max={12} style={{flex:1}}/>
          <Stepper label="Pursuit (2D6)" value={pursueRoll} onChange={setPursueRoll} min={2} max={12} style={{flex:1}}/>
        </div>
        <Button variant="secondary" block onClick={()=>{setFleeRoll(roll2d6());setPursueRoll(roll2d6());}} icon={<Icon name="dices" size={18}/>}>Roll both</Button>
        <Verdict ok={pursueRoll<fleeRoll}
          text={pursueRoll>=fleeRoll?`Caught (${pursueRoll} ≥ ${fleeRoll}) — DESTROYED → enemy VP`:`Escaped (${pursueRoll} < ${fleeRoll}) — it survives, the winner advances`}/>
      </Fragment>}
    </Body>
    <BottomBar>
      {step>0&&<Button variant="secondary" size="lg" onClick={back} icon={<Icon name="chevron-left" size={20}/>}>Back</Button>}
      <Button variant="primary" size="lg" block onClick={next}
        icon={<Icon name={step===PHASES.length-1?'check':'chevron-right'} size={20}/>}>
        {step===PHASES.length-1?'Finish':'Next step'}</Button>
    </BottomBar></Fragment>;
}

/* ════════════════════════════════════════════════════════════════
   8 · SCREEN 4 — Tracker d'état de partie & PV
   ════════════════════════════════════════════════════════════════ */
function computeVP(game) {
  const lost = (roster) => roster.filter(u=>u.status==='destroyed').reduce((s,u)=>s+(u.points*u.size),0);
  const obj = (who) => game.objectives.filter(o=>o.holder===who).length * 100;
  const myLost = lost(game.myRoster), foeLost = lost(game.foeRoster);
  return { me: foeLost + obj('me'), foe: myLost + obj('foe') };
}
function VPScoreboard({ vp, players }) {
  const lead=vp.me-vp.foe;const leading=lead>=0;
  return <div style={{background:'var(--surface-2)',borderRadius:'var(--r-lg)',border:'1px solid var(--border-subtle)',
    padding:'var(--sp-4)',boxShadow:'var(--shadow-2)'}}>
    <div style={{display:'flex',alignItems:'stretch'}}>
      {[['me',players.me,vp.me,'var(--signal-400)'],['foe',players.foe,vp.foe,'var(--out-flee)']].map(([k,name,score,col],i)=>(
        <Fragment key={k}>
          {i===1&&<div style={{width:1,background:'var(--border-default)',margin:'0 var(--sp-3)'}}/>}
          <div style={{flex:1,textAlign:i===0?'left':'right'}}>
            <div style={{font:'600 var(--fs-label)/1 var(--font-ui)',letterSpacing:'var(--ls-label)',textTransform:'uppercase',
              color:'var(--text-tertiary)'}}>{i===0?'You':'Enemy'}</div>
            <div style={{font:'700 44px/1 var(--font-display)',color:col,marginTop:4,fontVariantNumeric:'tabular-nums'}}>{score}</div>
            <div style={{font:'400 var(--fs-xs)/1 var(--font-ui)',color:'var(--text-tertiary)',marginTop:2}}>{name}</div></div>
        </Fragment>))}
    </div>
    <div style={{marginTop:'var(--sp-3)',padding:'var(--sp-2)',borderRadius:'var(--r-md)',
      background:leading?'var(--out-win-soft)':'var(--out-flee-soft)',textAlign:'center',
      font:'600 var(--fs-sm)/1 var(--font-ui)',color:leading?'var(--out-win)':'var(--out-flee)'}}>
      {lead===0?'Dead even':leading?`You lead by ${lead} VP`:`You trail by ${Math.abs(lead)} VP`}</div></div>;
}
function UnitRow({ unit, onCycle }) {
  const pct=unit.fuMax?unit.fuCurrent/unit.fuMax:0;const dead=unit.status==='destroyed';
  const barCol=unit.status==='weak'?'var(--status-weak)':unit.status==='fleeing'?'var(--status-fleeing)':
    dead?'var(--status-destroyed)':'var(--status-full)';
  return <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',opacity:dead?0.5:1}}>
    <div style={{flex:1,minWidth:0}}>
      <div style={{display:'flex',alignItems:'center',gap:6}}>
        <span style={{font:'600 var(--fs-body)/1.1 var(--font-ui)',color:'var(--text-primary)',overflow:'hidden',
          textOverflow:'ellipsis',whiteSpace:'nowrap',textDecoration:dead?'line-through':'none'}}>{unit.name}</span></div>
      <div style={{marginTop:5,height:5,borderRadius:'var(--r-pill)',background:'var(--surface-3)',overflow:'hidden',position:'relative'}}>
        <div style={{position:'absolute',inset:0,width:(pct*100)+'%',background:barCol,borderRadius:'var(--r-pill)'}}/>
        <div style={{position:'absolute',left:'25%',top:-1,bottom:-1,width:2,background:'var(--bg-app)'}}/></div></div>
    <button type="button" onClick={onCycle} style={{flex:'none',width:104,textAlign:'right',background:'transparent',
      border:'none',cursor:'pointer',padding:0}}>
      <StatusDot status={unit.status} showLabel={true} style={{justifyContent:'flex-end'}}/>
      <div style={{font:'400 var(--fs-xs)/1 var(--font-mono)',color:'var(--text-tertiary)',marginTop:3}}>{unit.points*unit.size} pts</div></button></div>;
}
const STATUS_CYCLE = ['full','weak','fleeing','destroyed'];
function ArmyPanel({ title, roster, side, onCycle }) {
  const lost=roster.filter(u=>u.status==='destroyed').reduce((s,u)=>s+u.points*u.size,0);
  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',margin:'4px 0 2px'}}>
      <span style={{font:'600 var(--fs-label)/1 var(--font-ui)',letterSpacing:'var(--ls-label)',textTransform:'uppercase',
        color:side==='enemy'?'var(--out-flee)':'var(--signal-400)'}}>{title}</span>
      <span style={{font:'400 var(--fs-xs)/1 var(--font-mono)',color:'var(--text-tertiary)'}}>lost {lost} pts</span></div>
    <div style={{background:'var(--surface-1)',border:'1px solid var(--border-subtle)',borderRadius:'var(--r-lg)',padding:'0 var(--sp-4)'}}>
      {roster.length===0&&<div style={{padding:'14px 0',font:'400 var(--fs-sm)/1 var(--font-ui)',color:'var(--text-tertiary)'}}>No unit.</div>}

function Objectives({ items, onSet }) {
  return <div>
    <div style={{font:'600 var(--fs-label)/1 var(--font-ui)',letterSpacing:'var(--ls-label)',textTransform:'uppercase',
      color:'var(--text-tertiary)',margin:'4px 0 6px'}}>Scenario objectives · 100 VP each</div>
    <div style={{background:'var(--surface-1)',border:'1px solid var(--border-subtle)',borderRadius:'var(--r-lg)',
      padding:'var(--sp-3) var(--sp-4)',display:'flex',flexDirection:'column',gap:10}}>
      {items.map(o=><div key={o.id} style={{display:'flex',alignItems:'center',gap:10}}>
        <span style={{flex:1,font:'500 var(--fs-sm)/1.2 var(--font-ui)',color:'var(--text-secondary)'}}>{o.name}</span>
        <Segmented size="sm" value={o.holder} onChange={v=>onSet(o.id,v)} style={{width:150}}
          options={[{value:'me',label:'You'},{value:'none',label:'—'},{value:'foe',label:'Foe'}]}/></div>)}</div></div>;
}
function GameTracker({ game, setGame }) {
  const vp = computeVP(game);
  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });
  const cycle = (sideKey) => (i) => setGame(g=>{
    const roster=[...g[sideKey]];const u={...roster[i]};
    const ni=(STATUS_CYCLE.indexOf(u.status)+1)%STATUS_CYCLE.length;u.status=STATUS_CYCLE[ni];
    u.fuCurrent=u.status==='destroyed'?0:u.status==='weak'?Math.max(1,Math.round(u.fuMax*0.2)):
      u.status==='fleeing'?Math.max(1,Math.round(u.fuMax*0.5)):u.fuMax;
    roster[i]=u;return {...g,[sideKey]:roster};
  });
  const setObj=(id,holder)=>setGame(g=>({...g,objectives:g.objectives.map(o=>o.id===id?{...o,holder}:o)}));
  return <Fragment>
    <ScreenHeader eyebrow={`Turn ${game.turn} · Melee phase`} title="Game" right={
      <span style={{font:'400 var(--fs-xs)/1.3 var(--font-mono)',color:'var(--text-tertiary)',textAlign:'right'}}>
        {game.mission}<br/>{game.pointsCap} pts</span>}/>
    <Body>
      <VPScoreboard vp={vp} players={{me:FACTIONS[game.myArmy],foe:FACTIONS[game.foeArmy]}}/>
      <Objectives items={game.objectives} onSet={setObj}/>
      <ArmyPanel title={`Your army · ${FACTIONS[game.myArmy]}`} roster={game.myRoster} side="friendly" onCycle={cycle('myRoster')}/>
      <ArmyPanel title={`Enemy army · ${FACTIONS[game.foeArmy]}`} roster={game.foeRoster} side="enemy" onCycle={cycle('foeRoster')}/>
      <div style={{display:'flex',gap:10}}>
        <Button variant="secondary" onClick={()=>setGame(g=>({...g,turn:Math.min(8,g.turn+1)}))}
          icon={<Icon name="chevron-right" size={18}/>} style={{flex:1}}>Next turn</Button>
        <Button variant="ghost" onClick={()=>{ if(confirm('Reset the game?')){localStorage.removeItem(STORE_KEY);setGame(freshGame());} }}
          icon={<Icon name="rotate-ccw" size={18}/>}>Reset</Button></div>
      <div style={{height:4}}/>
    </Body></Fragment>;
}

/* ════════════════════════════════════════════════════════════════
   9 · APP ROOT
   ════════════════════════════════════════════════════════════════ */
function NoData() {
  return <PhoneFrame><div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',
    justifyContent:'center',padding:24,textAlign:'center',gap:12}}>
    <Icon name="database" size={32} color="var(--out-flee)"/>
    <div style={{font:'600 var(--fs-h3)/1.3 var(--font-display)',color:'var(--text-primary)'}}>Data not found</div>
    <div style={{font:'400 var(--fs-sm)/1.5 var(--font-ui)',color:'var(--text-secondary)'}}>
      Augur couldn't load <code style={{font:'var(--font-mono)'}}>unit_db.js</code> / <code style={{font:'var(--font-mono)'}}>owb_unit_data.js</code>.
      These files must sit in the same folder as <code style={{font:'var(--font-mono)'}}>index.html</code>.</div></div></PhoneFrame>;
}

const LISTS_KEY = 'augur.lists.v1';
function normalizeImported(data) {
  if (Array.isArray(data)) return { name: 'Imported list', army: '', units: data };
  return {
    name: data.name || 'Imported list',
    army: data.army || '',
    units: Array.isArray(data.units) ? data.units : [],
  };
}

const freshFactors = (charger, ranks) => ({
  source: 'catalog',
  mine: (armyUnits(DEFAULT_MY_ARMY)[0]||{}).id,
  foe:  (armyUnits(DEFAULT_FOE_ARMY)[0]||{}).id,
  myList: 0, foeList: 0,
  charger: 'me', counterCharge: false, reaction: 'hold', fleeingTarget: false, standShootKills: 0,
  myAttacks: 9, foeAttacks: 6,
  challenge: false,
  me:  { ranks: 3, banner: true,  warbanner: false, flankRear: 0, highGround: false, impact: 0, overkill: 0, unbreakable: false },
  foe: { ranks: 4, banner: false, warbanner: false, flankRear: 0, highGround: false, impact: 0, overkill: 0, unbreakable: false },
});

// Welcome / divination splash shown on launch — tap to enter the app.
function Splash({ onEnter }) {
  const [leaving, setLeaving] = useState(false);
  const enter = () => { setLeaving(true); setTimeout(onEnter, 360); };
  return <Portal><div onClick={enter} style={{position:'fixed',inset:0,zIndex:200,cursor:'pointer',
    display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'var(--sp-5)',
    padding:'32px 28px calc(32px + var(--safe-bottom))',textAlign:'center',
    background:'radial-gradient(120% 90% at 50% 0%,#14181f 0%,var(--slate-950) 70%)',
    opacity:leaving?0:1,transition:'opacity var(--dur-slow) var(--ease-out)'}}>
    <img src="./logo-full.png" alt="Augur" onError={e=>{e.target.style.display='none';}}
      style={{width:'min(74vw,320px)',height:'auto',objectFit:'contain',
        filter:'drop-shadow(0 10px 50px rgba(63,167,214,0.30))',
        transform:leaving?'scale(1.04)':'scale(1)',transition:'transform var(--dur-slow) var(--ease-out)'}}/>
    <div>
      <div style={{font:'700 var(--fs-display)/1 var(--font-display)',color:'var(--text-primary)',letterSpacing:'var(--ls-tight)'}}>Augur</div>
      <div style={{marginTop:6,font:'600 var(--fs-body)/1.3 var(--font-ui)',color:'var(--signal-300)'}}>Omens of the Battlefield</div>
    </div>
    <p style={{maxWidth:360,margin:0,font:'400 var(--fs-sm)/1.65 var(--font-ui)',color:'var(--text-secondary)'}}>
      Read the signs the gods of the Old World send you. Before you roll a single die, Augur
      reads the omens of your engagements: it <b style={{color:'var(--text-primary)'}}>predicts the likely outcome</b> of
      each combat and <b style={{color:'var(--text-primary)'}}>guides you step by step</b> through the melee phase —
      to secure your victory.</p>
    <Button variant="primary" size="lg" icon={<Icon name="eye" size={22}/>}
      onClick={(e)=>{ e.stopPropagation(); enter(); }}>Consult the omens</Button>
    <div style={{font:'500 var(--fs-xs)/1 var(--font-ui)',color:'var(--text-tertiary)',letterSpacing:'0.04em'}}>Tap to enter</div>
  </div></Portal>;
}

function App() {
  const [splash, setSplash] = useState(true);
  const [tab, setTab] = useState('select');
  const [game, setGame] = useState(loadGame);
  const [lists, setLists] = useState(() => { try { return JSON.parse(localStorage.getItem(LISTS_KEY)) || []; } catch (e) { return []; } });
  const [sel, setSel] = useState(freshFactors);
  const [result, setResult] = useState(null);
  const [names, setNames] = useState(null);

  useEffect(()=>{ try{ localStorage.setItem(STORE_KEY, JSON.stringify(game)); }catch(e){} }, [game]);
  useEffect(()=>{ try{ localStorage.setItem(LISTS_KEY, JSON.stringify(lists)); }catch(e){} }, [lists]);
  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); }, [tab, result]);

  const myUnit  = resolveUnit('me', sel, game, lists);
  const foeUnit = resolveUnit('foe', sel, game, lists);

  // Auto-fill attacks / ranks / unbreakable from the chosen unit's real profile.
  const defRanks = (u) => Math.max(1, Math.min(3, Math.ceil((u.size||1)/5)));
  const defAtt   = (u) => Math.max(1, u.profile.a * Math.min(5, u.size||5));
  useEffect(()=>{ if(myUnit) setSel(s=>({ ...s, myAttacks: defAtt(myUnit),
    me:{ ...s.me, ranks: defRanks(myUnit), unbreakable: !!myUnit.unbreakable } })); }, [sel.mine, sel.source, sel.myList]);
  useEffect(()=>{ if(foeUnit) setSel(s=>({ ...s, foeAttacks: defAtt(foeUnit),
    foe:{ ...s.foe, ranks: defRanks(foeUnit), unbreakable: !!foeUnit.unbreakable } })); }, [sel.foe, sel.source, sel.foeList]);

  if (ROSTER.coverage === 0) return <NoData/>;

  const importList = (file) => {
    const r = new FileReader();
    r.onload = () => {
      try {
        const list = normalizeImported(JSON.parse(r.result));
        if (!list.units.length) { alert('No unit found in this file.'); return; }
        setLists(prev => {
          const next = [...prev, list];
          const idx = next.length - 1;
          setSel(s => ({ ...s, source:'lists', myList: idx, foeList: prev.length ? s.foeList : idx,
            mine: 'me:0', foe: prev.length ? s.foe : 'foe:0' }));
          return next;
        });
      } catch (e) { alert('Invalid JSON file: ' + e.message); }
    };
    r.readAsText(file);
  };

  // Add a configured unit to a list (existing index, or 'new'), then select it.
  const addUnit = (entry, side, target) => {
    setLists(prev => {
      let next, idx;
      if (target === 'new' || prev.length === 0) {
        const army = side==='me' ? game.myArmy : game.foeArmy;
        next = [...prev, { name: side==='me' ? 'My army' : 'Enemy army', army, units: [entry] }];
        idx = next.length - 1;
      } else {
        idx = target;
        next = prev.map((l,i) => i===idx ? { ...l, units: [...l.units, entry] } : l);
      }
      const ui = next[idx].units.length - 1;
      setSel(s => ({ ...s, source:'lists',
        ...(side==='me' ? { myList: idx, mine: 'me:'+ui } : { foeList: idx, foe: 'foe:'+ui }) }));
      return next;
    });
  };

  const runSim = () => {
    const me = resolveUnit('me', sel, game, lists), foe = resolveUnit('foe', sel, game, lists);
    if (!me || !foe) return;
    const myCharged  = sel.charger==='me'  || (sel.counterCharge && sel.charger==='foe');
    const foeCharged = sel.charger==='foe' || (sel.counterCharge && sel.charger==='me');
    let myStatic  = sideStatic(sel.me,  sel.foe, myCharged);
    let foeStatic = sideStatic(sel.foe, sel.me,  foeCharged);
    let myAttacks  = sel.myAttacks  + (myCharged  ? sel.me.impact  : 0);
    let foeAttacks = sel.foeAttacks + (foeCharged ? sel.foe.impact : 0);
    // Stand & Shoot (charge reaction): the defender shoots the charger — the
    // wounds reduce the charger's attacks AND count toward the defender's CR.
    if (sel.charger!=='none' && sel.reaction==='standshoot' && sel.standShootKills>0) {
      if (sel.charger==='me') { myAttacks  = Math.max(1, myAttacks  - sel.standShootKills * me.profile.a);  foeStatic += sel.standShootKills; }
      else                    { foeAttacks = Math.max(1, foeAttacks - sel.standShootKills * foe.profile.a); myStatic  += sel.standShootKills; }
    }
    const cfg = {
      me:{ ...me, unbreakable: sel.me.unbreakable }, foe:{ ...foe, unbreakable: sel.foe.unbreakable },
      myAttacks, foeAttacks, myStatic, foeStatic, fleeingTarget: sel.fleeingTarget,
      myCharged, foeCharged,
    };
    setResult(monteCarlo(cfg));
    setNames({ me: me.name, foe: foe.name, meShort: me.name.split(/[ ,]/)[0], foeShort: foe.name.split(/[ ,]/)[0] });
    setTab('result');
  };

  let screen;
  if (tab==='select') screen = <CombatSelect game={game} setGame={setGame} sel={sel} setSel={setSel}
    lists={lists} onImport={importList} onAddUnit={addUnit} onSimulate={runSim}/>;
  else if (tab==='result') screen = <ResultProbabilistic result={result} names={names}
    onResolve={()=>setTab('assistant')} onAdjust={()=>setTab('select')}/>;
  else if (tab==='assistant') screen = <CombatAssistant
    me={myUnit} foe={foeUnit} sel={sel} onDone={()=>setTab('tracker')}/>;
  else screen = <GameTracker game={game} setGame={setGame}/>;

  return <Fragment>
    <PhoneFrame active={tab} onTab={setTab}>{screen}</PhoneFrame>
    {splash && <Splash onEnter={()=>setSplash(false)}/>}
  </Fragment>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
